<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcards Pro - V51.9.8</title>
    <style>
        :root { --blue: #007bff; --purple: #6f42c1; --dark-blue: #2c3e50; --bg: #f4f7f9; --text-dark: #2d3436; --deep-blue: #0984e3; --light-gray: #f1f2f6; --red: #e74c3c; --green: #27ae60; --orange: #f39c12; --teal: #00cec9; --grey: #636e72; --db2: #16a085; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 80px; color: var(--text-dark); overflow-x: hidden; width: 100vw; }
        button, .nav-btn, .list-btn { transition: transform 0.1s ease, opacity 0.1s ease; cursor: pointer; border: none; outline: none; }
        button:active, .nav-btn:active, .list-btn:active { transform: scale(0.95); opacity: 0.8; }
        .main-nav { background: #2c3e50; width: 100%; display: flex; justify-content: center; padding: 12px 0; gap: 10px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); flex-wrap: wrap; }
        .nav-btn { padding: 10px 15px; border-radius: 6px; font-weight: bold; color: white; background: #455a64; font-size: 13px; }
        .nav-btn.active-a { background: var(--blue); }
        .nav-btn.active-b { background: var(--purple); }
        .nav-btn.active-c { background: var(--dark-blue); border: 1px solid white; }
        .nav-btn.active-d { background: var(--db2); }
        .card { background: white; width: 95%; max-width: 1000px; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin: 20px 0; border-top: 8px solid #ddd; box-sizing: border-box; }
        #sectionA .card { border-color: var(--blue); }
        #sectionB .card { border-color: var(--purple); }
        #sectionC .card { border-color: var(--dark-blue); }
        #sectionD .card { border-color: var(--db2); }
        .word-display { font-size: 32px; font-weight: 800; margin: 20px 0; min-height: 60px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .input-group { display: flex; width: 90%; margin: 0 auto 10px; gap: 10px; }
        .game-input { flex: 1; padding: 15px; border: 2px solid #b2bec3; border-radius: 10px; font-size: 20px; text-align: center; }
        .btn-check { padding: 0 20px; border-radius: 10px; font-weight: bold; color: white; background: #2d3436; }
        .feedback-area { font-weight: 900; font-size: 22px; min-height: 40px; margin-bottom: 15px; white-space: pre-line; }
        .db-section { display: none; width: 100%; flex-direction: column; align-items: center; }
        .db-section.active { display: flex; }
        .add-container { width: 95%; max-width: 1200px; background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; gap: 10px; border: 1px solid #eee; box-sizing: border-box; }
        .add-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .admin-panel { background: white; width: 95%; max-width: 1200px; border-radius: 15px; border: 1px solid #dfe6e9; margin-bottom: 30px; overflow: hidden; }
        .scroll-area { max-height: 600px; overflow-y: auto; overflow-x: auto; }
        table { width: 100%; min-width: 900px; border-collapse: collapse; }
        th { background: #2d3436; color: white; padding: 12px; font-size: 12px; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; }
        .hidden-text { background: var(--light-gray); color: var(--deep-blue); padding: 8px; border-radius: 6px; cursor: pointer; display: block; filter: blur(4px); transition: 0.2s; }
        tr:hover .hidden-text { filter: blur(0); }
        #toast { visibility: hidden; min-width: 200px; background: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); z-index: 2000; }
        #toast.show { visibility: visible; }
        .mode-sel { padding: 5px; border-radius: 4px; border: 1px solid #ccc; }
        @media (max-width: 600px) { .input-group, .add-container { flex-direction: column; } }
    </style>
</head>
<body>

    <div id="toast">Operazione completata!</div>

    <nav class="main-nav">
        <button id="navA" class="nav-btn active-a" onclick="switchTab('A')">Database 1</button>
        <button id="navD" class="nav-btn" onclick="switchTab('D')">Database 2</button>
        <button id="navB" class="nav-btn" onclick="switchTab('B')">Lesson and Grammar</button>
        <button id="navC" class="nav-btn" onclick="switchTab('C')">Verbi Irregolari</button>
    </nav>

    <template id="db-template">
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <div class="info-text" style="font-weight:bold;"></div>
                <select class="game-mode-select" onchange="syncGame(this)">
                    <option value="en">Solo Eng</option>
                    <option value="it">Solo Ita</option>
                    <option value="alt">Modalità Alt</option>
                </select>
            </div>
            <div class="word-display">
                <span class="display-text">...</span>
                <button class="speak-btn" style="background:none; font-size:25px;">🔊</button>
            </div>
            <div class="input-group">
                <input type="text" class="game-input" placeholder="Traduci..." autocomplete="off">
                <button class="btn-check" onclick="checkAnswer(this)">CONTROLLA</button>
            </div>
            <div class="feedback-area"></div>
        </div>
        <div class="add-container">
            <input type="text" class="add-en add-input" placeholder="Inglese">
            <input type="text" class="add-it add-input" placeholder="Italiano">
            <button class="btn-add" style="background:var(--green); color:white; padding:10px; border-radius:6px;" onclick="addItem(this)">AGGIUNGI +</button>
        </div>
        <div style="width:95%; max-width:1200px; margin-bottom:10px; display:flex; gap:10px;">
            <input type="text" placeholder="Cerca..." class="search-input" oninput="renderTable(this.closest('section').id.replace('section',''))" style="padding:8px; border-radius:5px; border:1px solid #ccc;">
            <button onclick="clearInputs(this)" style="padding:8px; background:var(--grey); color:white; border-radius:5px;">🔄 PULISCI</button>
        </div>
        <div class="admin-panel"><div class="scroll-area"><table></table></div></div>
    </template>

    <section id="sectionA" class="db-section active"></section>
    <section id="sectionD" class="db-section"></section>
    <section id="sectionB" class="db-section"></section>
    <section id="sectionC" class="db-section">
        <div class="card">
            <div id="infoC" style="font-weight:bold; margin-bottom:10px;"></div>
            <div class="word-display"><span id="displayC">...</span></div>
            <div class="input-group">
                <input type="text" id="ansC" class="game-input" placeholder="Paradigma o Traduzione...">
                <button class="btn-check" onclick="checkVerb()">CONTROLLA</button>
            </div>
            <div id="fbC" class="feedback-area"></div>
        </div>
        <div class="admin-panel"><div class="scroll-area"><table id="tableC"></table></div></div>
    </section>

    <div style="margin: 20px;">
        <button onclick="exportData()" style="padding:10px; background:#2d3436; color:white; border-radius:5px;">💾 ESPORTA BACKUP</button>
    </div>

    <script>
        const dbs = {
            A: { key: 'db_a_v5', data: [], deck: [], current: null },
            B: { key: 'db_b_v5', data: [], deck: [], current: null },
            C: { key: 'db_c_v5', data: [], deck: [], current: null },
            D: { key: 'db_d_v5', data: [], deck: [], current: null }
        };

        function init() {
            ['A', 'B', 'D'].forEach(t => {
                const sect = document.getElementById('section' + t);
                sect.innerHTML = document.getElementById('db-template').innerHTML;
                const saved = localStorage.getItem(dbs[t].key);
                if(saved) dbs[t].data = JSON.parse(saved);
                buildDeck(t);
            });
            
            // Carica Verbi
            const savedC = localStorage.getItem(dbs.C.key);
            if(savedC) dbs.C.data = JSON.parse(savedC);
            
            refreshUI();
        }

        function switchTab(t) {
            document.querySelectorAll('.db-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-a','active-b','active-c','active-d'));
            document.getElementById('section' + t).classList.add('active');
            document.getElementById('nav' + t).classList.add('active-' + t.toLowerCase());
            renderTable(t);
        }

        function buildDeck(t) {
            dbs[t].deck = dbs[t].data.filter(i => !i.paused).sort(() => Math.random() - 0.5);
            nextCard(t);
        }

        function nextCard(t) {
            const sect = document.getElementById('section' + t);
            if (!sect || t === 'C') return;

            const info = sect.querySelector('.info-text');
            const disp = sect.querySelector('.display-text');
            const speak = sect.querySelector('.speak-btn');
            
            if(dbs[t].deck.length === 0) {
                disp.innerText = "FINITO!";
                info.innerText = "0 rimasti";
                return;
            }

            dbs[t].current = dbs[t].deck[0];
            const item = dbs[t].current;
            const mode = sect.querySelector('.game-mode-select').value;
            
            let showEn = (mode === 'en' || (mode === 'alt' && item.lastAlt === 'it'));
            disp.innerText = showEn ? item.en : item.it;
            info.innerText = dbs[t].deck.length + " rimasti";
            speak.onclick = () => speakText(item.en);
        }

        function checkAnswer(btn) {
            const t = btn.closest('section').id.replace('section','');
            const sect = document.getElementById('section' + t);
            const input = sect.querySelector('.game-input');
            const fb = sect.querySelector('.feedback-area');
            const item = dbs[t].current;
            
            const target = (sect.querySelector('.display-text').innerText === item.en) ? item.it : item.en;
            
            if(input.value.trim().toLowerCase() === target.toLowerCase()) {
                fb.innerText = "CORRETTO!";
                fb.style.color = "var(--green)";
                if(sect.querySelector('.game-mode-select').value === 'alt') {
                    item.lastAlt = (sect.querySelector('.display-text').innerText === item.en) ? 'en' : 'it';
                }
                setTimeout(() => {
                    input.value = "";
                    fb.innerText = "";
                    dbs[t].deck.shift();
                    nextCard(t);
                    renderTable(t);
                }, 600);
            } else {
                fb.innerText = "ERRORE! Risposta: " + target;
                fb.style.color = "var(--red)";
            }
        }

        function renderTable(t) {
            if (t === 'C') return; // Gestione verbi a parte
            const sect = document.getElementById('section' + t);
            const table = sect.querySelector('table');
            const query = sect.querySelector('.search-input').value.toLowerCase();
            
            table.innerHTML = `<tr><th>#</th><th>Originale</th><th>Traduzione</th><th>Lingua</th><th>Azioni</th></tr>`;
            
            dbs[t].data.forEach((item, i) => {
                if(item.en.toLowerCase().includes(query) || item.it.toLowerCase().includes(query)) {
                    const tr = document.createElement('tr');
                    const isPaused = item.paused;
                    tr.innerHTML = `
                        <td>${i+1}</td>
                        <td style="font-weight:bold">${item.en}</td>
                        <td><span class="hidden-text" onclick="toggleItem('${t}', ${i})" style="${isPaused?'filter:none; color:red':''}">${item.it}</span></td>
                        <td>
                            <select class="mode-sel" onchange="updateItemMode('${t}', ${i}, this.value)">
                                <option value="en" ${item.mode==='en'?'selected':''}>Eng</option>
                                <option value="it" ${item.mode==='it'?'selected':''}>Ita</option>
                                <option value="alt" ${item.mode==='alt'?'selected':''}>Alt</option>
                            </select>
                        </td>
                        <td><button onclick="deleteItem('${t}', ${i})" style="background:none; font-size:18px;">🗑️</button></td>
                    `;
                    table.appendChild(tr);
                }
            });
        }

        function addItem(btn) {
            const t = btn.closest('section').id.replace('section','');
            const en = btn.closest('section').querySelector('.add-en');
            const it = btn.closest('section').querySelector('.add-it');
            if(!en.value || !it.value) return;
            
            dbs[t].data.push({ en: en.value, it: it.value, paused: false, mode: 'en', lastAlt: 'it' });
            save(t);
            en.value = ""; it.value = "";
            buildDeck(t);
            renderTable(t);
            showToast("Aggiunto!");
        }

        function toggleItem(t, i) {
            dbs[t].data[i].paused = !dbs[t].data[i].paused;
            save(t); buildDeck(t); renderTable(t);
        }

        function deleteItem(t, i) {
            if(confirm("Eliminare?")) {
                dbs[t].data.splice(i, 1);
                save(t); buildDeck(t); renderTable(t);
            }
        }

        function updateItemMode(t, i, val) {
            dbs[t].data[i].mode = val;
            save(t);
        }

        function syncGame(sel) {
            const t = sel.closest('section').id.replace('section','');
            buildDeck(t);
        }

        function clearInputs(btn) {
            const sect = btn.closest('section');
            sect.querySelector('.add-en').value = "";
            sect.querySelector('.add-it').value = "";
            sect.querySelector('.search-input').value = "";
            renderTable(sect.id.replace('section',''));
        }

        function save(t) { localStorage.setItem(dbs[t].key, JSON.stringify(dbs[t].data)); }
        function showToast(m) { const tt = document.getElementById('toast'); tt.innerText = m; tt.classList.add('show'); setTimeout(() => tt.classList.remove('show'), 2000); }
        function speakText(txt) { const u = new SpeechSynthesisUtterance(txt); u.lang = 'en-US'; window.speechSynthesis.speak(u); }
        function refreshUI() { ['A','B','D'].forEach(t => { renderTable(t); nextCard(t); }); }

        function exportData() {
            const all = { A: dbs.A.data, B: dbs.B.data, C: dbs.C.data, D: dbs.D.data };
            const blob = new Blob([JSON.stringify(all)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "backup_flashcards.json";
            a.click();
        }

        window.onload = init;
    </script>
</body>
</html>
