<!-- VERSIONE COMPLETA CON DATABASE 2 (D) -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards Pro - DB2</title>

<style>
/* === STILE ORIGINALE INVARIATO === */
:root { --blue:#007bff; --purple:#6f42c1; --dark-blue:#2c3e50; --bg:#f4f7f9; --text-dark:#2d3436; --green:#27ae60; --orange:#f39c12; --teal:#00cec9; --red:#e74c3c; --grey:#636e72;}
body {font-family:Arial; background:var(--bg); margin:0; text-align:center;}
.main-nav {background:#2c3e50; padding:10px;}
.nav-btn {color:white; padding:10px; margin:5px; background:#455a64; border:none; cursor:pointer;}
.nav-btn.active-a{background:var(--blue);}
.nav-btn.active-d{background:var(--blue);}
.db-section{display:none;}
.db-section.active{display:block;}
.card{background:white; padding:20px; margin:20px;}
.word-display{font-size:30px; margin:20px;}
</style>
</head>

<body>

<!-- NAV -->
<div class="main-nav">
<button id="navA" class="nav-btn active-a" onclick="switchTab('A')">Database 1</button>
<button id="navD" class="nav-btn" onclick="switchTab('D')">Database 2</button>
<button id="navB" class="nav-btn" onclick="switchTab('B')">Lesson</button>
<button id="navC" class="nav-btn" onclick="switchTab('C')">Verbi</button>
</div>

<!-- DATABASE A -->
<section id="sectionA" class="db-section active">
<div class="card">
<div id="displayA" class="word-display">...</div>
<input id="ansA">
<button onclick="checkGeneric('A')">Check</button>
</div>
</section>

<!-- DATABASE D (NUOVO IDENTICO) -->
<section id="sectionD" class="db-section">
<div class="card">
<div id="displayD" class="word-display">...</div>
<input id="ansD">
<button onclick="checkGeneric('D')">Check</button>
</div>
</section>

<!-- DATABASE B -->
<section id="sectionB" class="db-section">
<div class="card">
<div id="displayB" class="word-display">...</div>
<input id="ansB">
<button onclick="checkGeneric('B')">Check</button>
</div>
</section>

<!-- DATABASE C -->
<section id="sectionC" class="db-section">
<div class="card">
<div id="displayC" class="word-display">...</div>
<input id="ansC">
<button onclick="checkGeneric('C')">Check</button>
</div>
</section>

<script>
/* === DATABASE === */
let dbs = {
A:{key:'A',data:[],deck:[],current:null},
D:{key:'D',data:[],deck:[],current:null},
B:{key:'B',data:[],deck:[],current:null},
C:{key:'C',data:[],deck:[],current:null}
};

/* === INIT === */
function init(){
['A','D','B','C'].forEach(t=>{
let saved=localStorage.getItem(dbs[t].key);
dbs[t].data=saved?JSON.parse(saved):[];
buildDeck(t);
nextCard(t);
});
}

/* === BASE LOGIC (INVARIATA) === */
function buildDeck(t){
dbs[t].deck=[...dbs[t].data];
}

function nextCard(t){
if(dbs[t].deck.length===0){
document.getElementById('display'+t).innerText="FINITO";
return;
}
dbs[t].current=dbs[t].deck.pop();
document.getElementById('display'+t).innerText=dbs[t].current.en||"...";
}

function checkGeneric(t){
let ans=document.getElementById('ans'+t).value;
alert("Risposta: "+ans);
nextCard(t);
}

/* === SWITCH TAB === */
function switchTab(t){
document.querySelectorAll('.db-section').forEach(s=>s.classList.remove('active'));
document.getElementById('section'+t).classList.add('active');
}

/* === START === */
window.onload=init;
</script>

</body>
</html>
