<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcards Pro - V51.9.5</title>
    <style>
        :root { --blue: #007bff; --purple: #6f42c1; --dark-blue: #2c3e50; --bg: #f4f7f9; --text-dark: #2d3436; --deep-blue: #0984e3; --light-gray: #f1f2f6; --red: #e74c3c; --green: #27ae60; --orange: #f39c12; --teal: #00cec9; --grey: #636e72; --db2: #16a085; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 80px; color: var(--text-dark); overflow-x: hidden; width: 100vw; }
        
        button, .nav-btn, .list-btn { transition: transform 0.1s ease, opacity 0.1s ease; outline: none; cursor: pointer; border: none; }
        button:active, .nav-btn:active, .list-btn:active { transform: scale(0.92); opacity: 0.7; }
        
        .main-nav { background: #2c3e50; width: 100%; display: flex; justify-content: center; padding: 12px 0; gap: 15px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); flex-wrap: wrap; }
        .nav-btn { padding: 10px 20px; border-radius: 6px; font-weight: bold; color: white; background: #455a64; font-size: 14px; }
        .nav-btn.active-a { background: var(--blue); }
        .nav-btn.active-b { background: var(--purple); }
        .nav-btn.active-c { background: var(--dark-blue); border: 1px solid white; }
        .nav-btn.active-d { background: var(--db2); }

        .card { background: white; width: 95%; max-width: 1000px; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin: 20px 0; border-top: 8px solid #ddd; box-sizing: border-box; }
        #sectionA .card { border-color: var(--blue); }
        #sectionB .card { border-color: var(--purple); }
        #sectionC .card { border-color: var(--dark-blue); }
        #sectionD .card { border-color: var(--db2); }

        .word-display { font-size: 34px; font-weight: 800; margin: 25px auto; display: flex; align-items: center; justify-content: flex-start; gap: 15px; min-height: 60px; color: #1a1a1a; word-break: break-word; width: 85%; max-width: 850px; text-align: left; }
        .input-group { display: flex; width: 85%; max-width: 850px; margin: 0 auto 10px auto; gap: 10px; }
        .game-input { flex: 1; padding: 18px; border: 2px solid #b2bec3; border-radius: 10px; font-size: 22px; text-align: center; outline: none; box-sizing: border-box; }
        .btn-check { width: 180px; padding: 0 15px; border-radius: 10px; font-weight: bold; color: white; background: #2d3436; font-size: 16px; text-transform: uppercase; }
        
        .feedback-area { margin: 0 auto 20px auto; width: 85%; max-width: 850px; font-weight: 900; font-size: 26px; min-height: 45px; color: var(--deep-blue); line-height: 1.4; white-space: pre-line; text-align: left; }
        
        .db-section { display: none; width: 100%; flex-direction: column; align-items: center; padding: 20px 0; }
        .db-section.active { display: flex; }

        .add-container { width: 95%; max-width: 1200px; background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; box-sizing: border-box; }
        .add-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        
        .admin-panel { background: white; width: 95%; max-width: 1200px; border-radius: 15px; border: 1px solid #dfe6e9; margin-bottom: 30px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .scroll-area { max-height: 800px; overflow-y: auto; overflow-x: auto; }
        table { width: 100%; min-width: 1000px; border-collapse: collapse; }
        th { background: #2d3436; padding: 15px 5px; font-size: 11px; color: white; position: sticky; top: 0; z-index: 10; }
        td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; }
        
        .list-active-highlight { background-color: #e3f2fd; padding: 4px 8px; border-radius: 6px; display: inline-block; font-weight: bold; }
        .hidden-text { background: var(--light-gray); color: var(--deep-blue); padding: 8px 12px; border-radius: 6px; cursor: pointer; display: block; filter: blur(4px); transition: 0.2s; }
        tr:hover .hidden-text { filter: blur(0); background: var(--deep-blue); color: white; }
        
        .btn-tool { padding: 10px 15px; border-radius: 8px; color: white; font-weight: bold; font-size: 12px; margin-right: 5px; }
        #toast { visibility: hidden; min-width: 250px; background: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 2000; left: 50%; bottom: 30px; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity:0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        @media (max-width: 768px) {
            .input-group { flex-direction: column; }
            .btn-check { width: 100%; padding: 15px; }
            .add-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div id="toast">Operazione completata!</div>

    <nav class="main-nav">
        <button id="navA" class="nav-btn active-a" onclick="switchTab('A')">Database 1</button>
        <button id="navB" class="nav-btn" onclick="switchTab('B')">Lesson and Grammar</button>
        <button id="navC" class="nav-btn" onclick="switchTab('C')">Verbi Irregolari</button>
        <button id="navD" class="nav-btn" onclick="switchTab('D')">Database 2</button>
    </nav>

    <section id="sectionA" class="db-section active">
        <div class="card">
            <div class="card-header" style="display:flex; justify-content:space-between; padding:0 20px;">
                <div id="infoA" style="font-weight:bold; color:var(--blue);"></div>
                <select id="gameModeA" onchange="syncFromGame('A')" style="padding:5px; border-radius:5px;">
                    <option value="en">Solo Eng</option>
                    <option value="it">Solo Ita</option>
                    <option value="alt">Modalità Alt</option>
                </select>
            </div>
            <div class="word-display"><span id="displayA">...</span><button onclick="speakItem(dbs.A.current.en)" style="background:none; font-size:30px;">🔊</button></div>
            <div class="input-group">
                <input type="text" id="ansA" class="game-input" placeholder="Traduci..." autocomplete="off">
                <button class="btn-check" onclick="checkGeneric('A')">CONTROLLA</button>
            </div>
            <div id="fbA" class="feedback-area"></div>
        </div>
        <div class="add-container">
            <input type="text" id="newEnA" class="add-input" placeholder="Inglese">
            <input type="text" id="newItA" class="add-input" placeholder="Italiano">
            <button class="btn-add" style="background:var(--green); color:white; padding:10px 20px; border-radius:6px;" onclick="smartAdd('A')">AGGIUNGI +</button>
        </div>
        <div style="width:95%; max-width:1200px; margin-bottom:10px;">
            <input type="text" id="searchA" placeholder="Cerca..." oninput="renderTable('A')" style="padding:10px; width:200px; border-radius:8px; border:1px solid #ccc;">
            <button class="btn-tool" style="background:var(--grey)" onclick="refreshList('A')">🔄 AGGIORNA</button>
        </div>
        <div class="admin-panel"><div class="scroll-area"><table id="tableA"></table></div></div>
    </section>

    <section id="sectionD" class="db-section">
        <div class="card">
            <div class="card-header" style="display:flex; justify-content:space-between; padding:0 20px;">
                <div id="infoD" style="font-weight:bold; color:var(--db2);"></div>
                <select id="gameModeD" onchange="syncFromGame('D')" style="padding:5px; border-radius:5px;">
                    <option value="en">Solo Eng</option>
                    <option value="it">Solo Ita</option>
                    <option value="alt">Modalità Alt</option>
                </select>
            </div>
            <div class="word-display"><span id="displayD">...</span><button onclick="speakItem(dbs.D.current.en)" style="background:none; font-size:30px;">🔊</button></div>
            <div class="input-group">
                <input type="text" id="ansD" class="game-input" placeholder="Traduci..." autocomplete="off">
                <button class="btn-check" style="background:var(--db2)" onclick="checkGeneric('D')">CONTROLLA</button>
            </div>
            <div id="fbD" class="feedback-area"></div>
        </div>
        <div class="add-container">
            <input type="text" id="newEnD" class="add-input" placeholder="Inglese">
            <input type="text" id="newItD" class="add-input" placeholder="Italiano">
            <button class="btn-add" style="background:var(--green); color:white; padding:10px 20px; border-radius:6px;" onclick="smartAdd('D')">AGGIUNGI +</button>
        </div>
        <div style="width:95%; max-width:1200px; margin-bottom:10px;">
            <input type="text" id="searchD" placeholder="Cerca..." oninput="renderTable('D')" style="padding:10px; width:200px; border-radius:8px; border:1px solid #ccc;">
            <button class="btn-tool" style="background:var(--grey)" onclick="refreshList('D')">🔄 AGGIORNA</button>
        </div>
        <div class="admin-panel"><div class="scroll-area"><table id="tableD"></table></div></div>
    </section>

    <div class="backup-footer">
        <button class="btn-backup" style="background:#2d3436" onclick="exportData()">ESPORTA BACKUP</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        <button class="btn-backup" style="background:#636e72" onclick="document.getElementById('importFile').click()">IMPORTA BACKUP</button>
    </div>

    <script>
        const dbs = {
            A: { data: [], deck: [], current: null },
            B: { data: [], deck: [], current: null },
            C: { data: [], deck: [], current: null },
            D: { data: [], deck: [], current: null }
        };

        function init() {
            ['A','B','C', 'D'].forEach(t => {
                const saved = localStorage.getItem('flash_db_' + t);
                if(saved) dbs[t].data = JSON.parse(saved);
                buildDeck(t);
                renderTable(t);
            });
            nextCard('A'); nextCard('B'); nextCard('C'); nextCard('D');
        }

        function switchTab(t) {
            document.querySelectorAll('.db-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-a','active-b','active-c','active-d'));
            document.getElementById('section' + t).classList.add('active');
            document.getElementById('nav' + t).classList.add('active-' + t.toLowerCase());
        }

        function renderTable(t) {
            const table = document.getElementById('table' + t);
            const search = document.getElementById('search' + t).value.toLowerCase();
            const data = dbs[t].data;
            
            table.innerHTML = `<tr><th style="width:50px">#</th><th>Frase</th><th>Traduzione (Click p/r)</th><th style="width:100px">Modo</th><th style="width:80px">Azioni</th></tr>`;
            
            data.forEach((item, idx) => {
                if(item.en.toLowerCase().includes(search) || item.it.toLowerCase().includes(search)) {
                    const tr = document.createElement('tr');
                    const isCurrent = (dbs[t].current && item.en === dbs[t].current.en);
                    const isPaused = item.nextReview > Date.now() + 1000000000;
                    
                    const mainDisplay = isCurrent ? `<span class="list-active-highlight">${item.en}</span>` : item.en;
                    
                    tr.innerHTML = `
                        <td>${idx + 1}</td>
                        <td style="text-align:left; padding-left:15px">${mainDisplay}</td>
                        <td onclick="handlePause('${t}', ${idx})" style="cursor:pointer; text-align:left">
                            <span class="hidden-text" style="${isPaused ? 'filter:none; color:var(--red); background:#ffeaea;' : ''}">${item.it}</span>
                        </td>
                        <td>
                            <select onchange="updateItemMode('${t}', ${idx}, this.value)">
                                <option value="en" ${item.mode==='en'?'selected':''}>Eng</option>
                                <option value="it" ${item.mode==='it'?'selected':''}>Ita</option>
                                <option value="alt" ${item.mode==='alt'?'selected':''}>Alt</option>
                            </select>
                        </td>
                        <td><button onclick="removeItem('${t}', ${idx})" style="background:var(--red); color:white; border-radius:4px; padding:5px 10px">🗑️</button></td>
                    `;
                    table.appendChild(tr);
                }
            });
        }

        function handlePause(t, idx) {
            const item = dbs[t].data[idx];
            if(item.nextReview > Date.now()) {
                item.nextReview = 0;
                showToast("Riattivato!");
            } else {
                item.nextReview = Date.now() + 999999999999;
                showToast("Posticipato!");
            }
            save(t); buildDeck(t); renderTable(t);
        }

        function updateItemMode(t, idx, val) {
            dbs[t].data[idx].mode = val;
            save(t); showToast("Modo aggiornato!");
        }

        function refreshList(t) {
            document.getElementById('newEn' + t).value = "";
            document.getElementById('newIt' + t).value = "";
            document.getElementById('search' + t).value = "";
            renderTable(t);
            showToast("Campi puliti e lista aggiornata!");
        }

        function smartAdd(t) {
            const en = document.getElementById('newEn' + t).value.trim();
            const it = document.getElementById('newIt' + t).value.trim();
            if(!en || !it) return;
            dbs[t].data.push({ en, it, nextReview: 0, mode: 'en', lastAltState: 'en' });
            save(t); buildDeck(t); renderTable(t);
            document.getElementById('newEn' + t).value = "";
            document.getElementById('newIt' + t).value = "";
            showToast("Aggiunto!");
        }

        function buildDeck(t) {
            dbs[t].deck = dbs[t].data.filter(i => i.nextReview <= Date.now());
            dbs[t].deck.sort(() => Math.random() - 0.5);
        }

        function nextCard(t) {
            if(dbs[t].deck.length === 0) {
                document.getElementById('display' + t).innerText = "Sessione finita!";
                return;
            }
            dbs[t].current = dbs[t].deck[0];
            const item = dbs[t].current;
            let show = "";
            if(item.mode === 'en') show = item.en;
            else if(item.mode === 'it') show = item.it;
            else show = (item.lastAltState === 'en' ? item.it : item.en);
            
            document.getElementById('display' + t).innerText = show;
            document.getElementById('info' + t).innerText = `Rimasti: ${dbs[t].deck.length}`;
            renderTable(t);
        }

        function checkGeneric(t) {
            const input = document.getElementById('ans' + t).value.trim().toLowerCase();
            const item = dbs[t].current;
            const target = (document.getElementById('display' + t).innerText === item.en) ? item.it : item.en;
            
            if(input === target.toLowerCase()) {
                document.getElementById('fb' + t).innerText = "CORRETTO! 🎉";
                document.getElementById('fb' + t).style.color = "var(--green)";
                setTimeout(() => {
                    document.getElementById('ans' + t).value = "";
                    document.getElementById('fb' + t).innerText = "";
                    dbs[t].deck.shift();
                    nextCard(t);
                }, 1000);
            } else {
                document.getElementById('fb' + t).innerText = "Riprova!\nSoluzione: " + target;
                document.getElementById('fb' + t).style.color = "var(--red)";
            }
        }

        function save(t) { localStorage.setItem('flash_db_' + t, JSON.stringify(dbs[t].data)); }
        function showToast(m) { const tt = document.getElementById('toast'); tt.innerText = m; tt.className = "show"; setTimeout(() => tt.className = "", 3000); }
        function speakItem(txt) { const u = new SpeechSynthesisUtterance(txt); u.lang = 'en-US'; window.speechSynthesis.speak(u); }

        function exportData() {
            const all = { A: dbs.A.data, B: dbs.B.data, C: dbs.C.data, D: dbs.D.data };
            const blob = new Blob([JSON.stringify(all)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `backup_flashcards_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(ev) {
                const imported = JSON.parse(ev.target.result);
                if(imported.A) { dbs.A.data = imported.A; save('A'); }
                if(imported.B) { dbs.B.data = imported.B; save('B'); }
                if(imported.C) { dbs.C.data = imported.C; save('C'); }
                if(imported.D) { dbs.D.data = imported.D; save('D'); }
                location.reload();
            };
            reader.readAsText(file);
        }

        window.onload = init;
    </script>
</body>
</html>
