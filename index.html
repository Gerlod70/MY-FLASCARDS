<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Inglese B2</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .card {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            color: #1a73e8;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
        }

        /* MODIFICA PER CENTRATURA PC */
        .word-display {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #202124;
            min-height: 2.5rem;
            /* Allineamento specifico */
            text-align: center;
            width: 100%;
            display: block;
        }

        .translation-display {
            font-size: 1.2rem;
            color: #5f6368;
            margin-bottom: 1.5rem;
            min-height: 1.5rem;
            /* Allineamento specifico */
            text-align: center;
            width: 100%;
            display: block;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 2px solid #dadce0;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #1a73e8;
        }

        button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #1557b0;
        }

        .feedback {
            margin-top: 1rem;
            font-weight: bold;
            min-height: 1.2rem;
        }

        .correct { color: #34a853; }
        .incorrect { color: #ea4335; }

        /* Media query per ottimizzazione PC */
        @media screen and (min-width: 768px) {
            .word-display, .translation-display {
                margin-left: auto;
                margin-right: auto;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Flashcard Challenge</h1>
    
    <div id="word" class="word-display">Caricamento...</div>
    <div id="translation" class="translation-display"></div>

    <input type="text" id="userInput" placeholder="Scrivi la traduzione..." autocomplete="off">
    <button onclick="checkAnswer()" id="submitBtn">Verifica</button>

    <div id="feedback" class="feedback"></div>
</div>

<script>
    // Database parole (Esempio basato sulle ultime interazioni)
    const flashcards = [
        { word: "Patent cliff", translation: "Baratro brevettuale" },
        { word: "To bear", translation: "Sopportare" },
        { word: "Look over", translation: "Esaminare" },
        { word: "Hurry up", translation: "Fare in fretta" },
        { word: "Below", translation: "Sotto" }
    ];

    let currentCardIndex = 0;

    function displayCard() {
        const card = flashcards[currentCardIndex];
        document.getElementById('word').textContent = card.word;
        document.getElementById('translation').textContent = "";
        document.getElementById('feedback').textContent = "";
        document.getElementById('userInput').value = "";
        document.getElementById('userInput').focus();
    }

    function checkAnswer() {
        const userInput = document.getElementById('userInput').value.trim().toLowerCase();
        const correctAnswer = flashcards[currentCardIndex].translation.toLowerCase();
        const feedbackDiv = document.getElementById('feedback');
        const translationDiv = document.getElementById('translation');

        if (userInput === correctAnswer) {
            feedbackDiv.textContent = "Corretto! ✨";
            feedbackDiv.className = "feedback correct";
        } else {
            feedbackDiv.textContent = "Riprova! ❌";
            feedbackDiv.className = "feedback incorrect";
        }
        
        translationDiv.textContent = flashcards[currentCardIndex].translation;

        // Passa alla prossima carta dopo 2 secondi
        setTimeout(() => {
            currentCardIndex = (currentCardIndex + 1) % flashcards.length;
            displayCard();
        }, 2000);
    }

    // Permette l'invio con il tasto Enter
    document.getElementById('userInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkAnswer();
        }
    });

    // Avvio gioco
    displayCard();
</script>

</body>
</html>
