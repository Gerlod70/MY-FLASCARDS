<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcards Pro - V52.1</title>
    <style>
        :root { --blue: #007bff; --purple: #6f42c1; --dark-blue: #2c3e50; --bg: #f4f7f9; --text-dark: #2d3436; --deep-blue: #0984e3; --light-gray: #f1f2f6; --red: #e74c3c; --green: #27ae60; --orange: #f39c12; --teal: #00cec9; --grey: #636e72; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 80px; color: var(--text-dark); overflow-x: hidden; width: 100vw; }
        
        button, .nav-btn, .list-btn { transition: transform 0.1s ease, opacity 0.1s ease; outline: none; cursor: pointer; border: none; }
        button:active, .nav-btn:active, .list-btn:active { transform: scale(0.92); opacity: 0.7; }

        .main-nav { background: #2c3e50; width: 100%; display: flex; justify-content: center; padding: 12px 0; gap: 15px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); flex-wrap: wrap; }
        .nav-btn { padding: 10px 20px; border-radius: 6px; font-weight: bold; color: white; background: #455a64; font-size: 14px; }
        .nav-btn.active-a { background: var(--blue); }
        .nav-btn.active-b { background: var(--purple); }
        .nav-btn.active-c { background: var(--dark-blue); border: 1px solid white; }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 10px; }
        .card-mode-selector { padding: 5px 10px; border-radius: 8px; border: 1px solid #ddd; background: #f8f9fa; font-size: 13px; font-weight: bold; color: var(--text-dark); outline: none; }

        .card { background: white; width: 100%; max-width: 1000px; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin-bottom: 25px; border-top: 8px solid #ddd; box-sizing: border-box; }
        #sectionA .card { border-color: var(--blue); }
        #sectionB .card { border-color: var(--purple); }
        #sectionC .card { border-color: var(--dark-blue); }

        .word-display { font-size: 34px; font-weight: 800; margin: 25px 0; display: flex; align-items: center; justify-content: center; gap: 15px; min-height: 60px; color: #1a1a1a; word-break: break-word; }
        .game-input { width: 85%; max-width: 850px; padding: 18px; border: 2px solid #b2bec3; border-radius: 10px; font-size: 22px; text-align: center; outline: none; margin: 0 auto 10px auto; display: block; box-sizing: border-box; }
        
        .feedback-area { margin: 0 auto 20px auto; width: 85%; max-width: 850px; font-weight: 900; font-size: 26px; min-height: 45px; color: var(--deep-blue); line-height: 1.4; white-space: pre-line; text-align: left; }
        
        .btn-check { width: 85%; max-width: 850px; padding: 18px; border-radius: 10px; font-weight: bold; color: white; background: #2d3436; font-size: 18px; text-transform: uppercase; margin: 0 auto 15px auto; display: block; }
        .btn-restart { background: #27ae60; color: white; padding: 15px 30px; border-radius: 10px; font-size: 20px; font-weight: bold; margin-top: 20px; display: none; }

        .game-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 85%; max-width: 850px; margin: 0 auto; }
        .btn-act { padding: 14px; border-radius: 8px; color: white; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .btn-edit { background: #636e72; }
        .btn-postpone { background: var(--orange); }
        .btn-delete { background: var(--red); }

        .db-section { display: none; width: 100%; flex-direction: column; align-items: center; padding: 20px 0; }
        .db-section.active { display: flex; }

        .add-container { width: 100%; max-width: 1200px; background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; box-sizing: border-box;}
        .add-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .btn-add { background: var(--green); color: white; padding: 10px 20px; border-radius: 6px; font-weight: bold; font-size: 14px; }

        .search-container { width: 100%; max-width: 1200px; margin-bottom: 15px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; box-sizing: border-box; padding: 0 5px; }
        .search-input { width: 250px; flex-grow: 1; padding: 12px 15px; border-radius: 10px; border: 1px solid #dfe6e9; font-size: 16px; outline: none; box-sizing: border-box; }
        .btn-tool { padding: 10px 15px; border-radius: 8px; color: white; font-weight: bold; font-size: 12px; text-transform: uppercase; }
        
        .admin-panel { background: white; width: 100%; max-width: 1200px; border-radius: 15px; border: 1px solid #dfe6e9; margin-bottom: 30px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        .list-header { padding: 18px 25px; background: #f8f9fa; border-bottom: 2px solid #eee; font-weight: bold; }
        
        .scroll-area { max-height: 1000px; overflow-y: auto; overflow-x: auto; position: relative; -webkit-overflow-scrolling: touch; }
        
        table { width: 100%; min-width: 1000px; border-collapse: collapse; table-layout: fixed; }
        th { background: #2d3436; padding: 15px 5px; font-size: 11px; color: white; text-transform: uppercase; text-align: center; position: sticky; top: 0; z-index: 10; }
        td { padding: 12px 4px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; vertical-align: middle; }
        
        .col-idx { width: 40px; }
        .col-main { width: 230px; text-align: left !important; padding-left: 20px !important; font-weight: 700; word-break: break-word; }
        .col-trans { width: 400px; text-align: left !important; }

        .list-active-highlight { background-color: #e3f2fd; padding: 4px 8px; border-radius: 6px; display: inline-block; }

        .list-btn { padding: 8px 12px; border-radius: 6px; font-weight: bold; color: white; min-width: 40px; }
        .btn-edit-list { background: var(--grey); }
        .btn-postpone-list { background: var(--orange); }
        .btn-reactivate-list { background: var(--green); }
        .btn-trash-list { background: var(--red); box-shadow: 0 2px 4px rgba(231, 76, 60, 0.3); }
        
        .hidden-text { background: var(--light-gray); color: var(--deep-blue); padding: 8px 12px; border-radius: 6px; cursor: pointer; display: block; width: 95%; border: 1px solid #dcdde1; box-sizing: border-box; filter: blur(4px); white-space: pre-wrap; word-break: break-word; transition: filter 0.2s; }
        #tableC .hidden-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .hidden-text.force-visible { filter: blur(0) !important; background: var(--deep-blue) !important; color: white !important; font-weight: bold !important; }

        tr:hover .hidden-text { filter: blur(0); background: var(--deep-blue); color: white !important; font-weight: bold; }
        
        .backup-footer { width: 100%; max-width: 1200px; display: flex; justify-content: center; gap: 20px; margin-top: 20px; padding: 20px; border-top: 2px dashed #ccc; box-sizing: border-box; }
        .btn-backup { padding: 15px 25px; border-radius: 10px; color: white; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-export { background: #2d3436; }
        .btn-import { background: #636e72; }

        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 2000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold; pointer-events: none; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        
        select { padding: 6px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        @media (max-width: 1250px) { body { padding: 0 10px; } .game-input, .btn-check, .feedback-area, .game-controls { width: 100%; max-width: none; } }
        @media (max-width: 768px) { .card { padding: 15px; } .add-container { flex-direction: column; } .backup-footer { flex-direction: column; align-items: stretch; } }
    </style>
</head>
<body>

    <div id="toast">Operazione completata!</div>

    <nav class="main-nav">
        <button id="navA" class="nav-btn active-a" onclick="switchTab('A')">Database 1</button>
        <button id="navB" class="nav-btn" onclick="switchTab('B')">Lesson and Grammar</button>
        <button id="navC" class="nav-btn" onclick="switchTab('C')">Verbi Irregolari</button>
    </nav>

    <section id="sectionA" class="db-section active">
        <div class="card">
            <div class="card-header">
                <div id="infoA" style="font-size:14px; font-weight:bold; color:var(--blue);"></div>
                <select id="gameModeA" class="card-mode-selector" onchange="syncFromGame('A')">
                    <option value="en">Solo Eng</option>
                    <option value="it">Solo Ita</option>
                    <option value="alt">Modalità Alt</option>
                </select>
            </div>
            <div class="word-display"><span id="displayA">...</span><button onclick="speakItem(dbs.A.current.en)" style="background:none; font-size:30px;">🔊</button></div>
            <div id="gameA">
                <input type="text" id="ansA" class="game-input" placeholder="Traduci..." autocomplete="off">
                <div id="fbA" class="feedback-area"></div>
                <button id="checkA" class="btn-check" onclick="checkGeneric('A')">CONTROLLA</button>
                <div class="game-controls">
                    <button class="btn-act btn-edit" onclick="manualEdit('A')">Modifica</button>
                    <button class="btn-act btn-postpone" onclick="togglePause('A')">Posticipa</button>
                    <button class="btn-act btn-delete" onclick="manualDelete('A')">Elimina</button>
                </div>
            </div>
            <button id="restartA" class="btn-restart" onclick="restartSession('A')">RICOMINCIA SESSIONE 🔄</button>
        </div>
        <div class="add-container">
            <input type="text" id="newEnA" class="add-input" placeholder="Inglese (o scrivi qui per tradurre)" onkeydown="if(event.key==='Enter') addNewItem('A')">
            <input type="text" id="newItA" class="add-input" placeholder="Italiano (o scrivi qui per tradurre)" onkeydown="if(event.key==='Enter') addNewItem('A')">
            <button class="btn-add" onclick="addNewItem('A')">AGGIUNGI +</button>
        </div>
        <div class="search-container">
            <input type="text" id="searchA" class="search-input" placeholder="Cerca..." oninput="renderTable('A')">
            <button class="btn-tool" style="background:var(--grey)" onclick="refreshList('A')">🔄 AGGIORNA</button>
            <button class="btn-tool" style="background:var(--orange)" onclick="postponeAll('A')">⏳ POSTICIPA TUTTO</button>
            <button class="btn-tool" style="background:var(--teal)" onclick="reactivateAll('A')">⚡ RIATTIVA TUTTO</button>
        </div>
        <div class="admin-panel"><div class="list-header">Lista Database 1</div><div class="scroll-area"><table id="tableA"></table></div></div>
    </section>

    <section id="sectionB" class="db-section">
        <div class="card">
            <div class="card-header">
                <div id="infoB" style="font-size:14px; font-weight:bold; color:var(--purple);"></div>
                <select id="gameModeB" class="card-mode-selector" onchange="syncFromGame('B')">
                    <option value="en">Solo Eng</option>
                    <option value="it">Solo Ita</option>
                    <option value="alt">Modalità Alt</option>
                </select>
            </div>
            <div class="word-display"><span id="displayB">...</span><button onclick="speakItem(dbs.B.current.en)" style="background:none; font-size:30px;">🔊</button></div>
            <div id="gameB">
                <input type="text" id="ansB" class="game-input" placeholder="Traduci..." autocomplete="off">
                <div id="fbB" class="feedback-area"></div>
                <button id="checkB" class="btn-check" onclick="checkGeneric('B')" style="background:var(--purple)">CONTROLLA</button>
                <div class="game-controls">
                    <button class="btn-act btn-edit" onclick="manualEdit('B')">Modifica</button>
                    <button class="btn-act btn-postpone" onclick="togglePause('B')">Posticipa</button>
                    <button class="btn-act btn-delete" onclick="manualDelete('B')">Elimina</button>
                </div>
            </div>
            <button id="restartB" class="btn-restart" onclick="restartSession('B')">RICOMINCIA SESSIONE 🔄</button>
        </div>
        <div class="add-container">
            <input type="text" id="newEnB" class="add-input" placeholder="Inglese (o scrivi qui per tradurre)" onkeydown="if(event.key==='Enter') addNewItem('B')">
            <input type="text" id="newItB" class="add-input" placeholder="Italiano (o scrivi qui per tradurre)" onkeydown="if(event.key==='Enter') addNewItem('B')">
            <button class="btn-add" style="background:var(--purple)" onclick="addNewItem('B')">AGGIUNGI +</button>
        </div>
        <div class="search-container">
            <input type="text" id="searchB" class="search-input" placeholder="Cerca..." oninput="renderTable('B')">
            <button class="btn-tool" style="background:var(--grey)" onclick="refreshList('B')">🔄 AGGIORNA</button>
            <button class="btn-tool" style="background:var(--orange)" onclick="postponeAll('B')">⏳ POSTICIPA TUTTO</button>
            <button class="btn-tool" style="background:var(--teal)" onclick="reactivateAll('B')">⚡ RIATTIVA TUTTO</button>
        </div>
        <div class="admin-panel"><div class="list-header">Lista Lesson and Grammar</div><div class="scroll-area"><table id="tableB"></table></div></div>
    </section>

    <section id="sectionC" class="db-section">
        <div class="card">
            <div class="card-header">
                <div id="infoC" style="font-weight: bold; color: #7f8c8d;"></div>
                <select id="gameModeC" class="card-mode-selector" onchange="syncFromGame('C')">
                    <option value="en">Eng -> Ita</option>
                    <option value="it">Ita -> Eng</option>
                    <option value="alt">Modalità Alt</option>
                </select>
            </div>
            <div class="word-display"><span id="displayC">...</span><button id="speakBtnC" onclick="speakItem(dbs.C.current.full)" style="background:none; font-size:30px;">🔊</button></div>
            <div id="gameC">
                <input type="text" id="ansC" class="game-input" placeholder="Paradigma o Traduzione..." autocomplete="off">
                <div id="fbC" class="feedback-area"></div>
                <button id="checkC" class="btn-check" onclick="checkVerb()" style="background:var(--dark-blue)">CONTROLLA</button>
                <div class="game-controls">
                    <button class="btn-act btn-edit" onclick="manualEdit('C')">Modifica</button>
                    <button class="btn-act btn-postpone" onclick="togglePause('C')">Posticipa</button>
                    <button class="btn-act btn-delete" onclick="manualDelete('C')">Elimina</button>
                </div>
            </div>
            <button id="restartC" class="btn-restart" onclick="restartSession('C')">RICOMINCIA SESSIONE 🔄</button>
        </div>
        <div class="add-container"><input type="text" id="newBaseC" class="add-input" placeholder="Base" onkeydown="if(event.key==='Enter') addNewItem('C')"><input type="text" id="newFullC" class="add-input" placeholder="Paradigma" onkeydown="if(event.key==='Enter') addNewItem('C')"><input type="text" id="newItC" class="add-input" placeholder="Traduzione" onkeydown="if(event.key==='Enter') addNewItem('C')"><button class="btn-add" style="background:var(--dark-blue)" onclick="addNewItem('C')">AGGIUNGI +</button></div>
        <div class="search-container"><input type="text" id="searchC" class="search-input" placeholder="Cerca..." oninput="renderTable('C')"></div>
        <div class="admin-panel"><div class="list-header">Lista Verbi</div><div class="scroll-area"><table id="tableC"></table></div></div>
    </section>

    <div class="backup-footer">
        <button class="btn-backup btn-export" onclick="exportData()">💾 ESPORTA BACKUP</button>
        <button class="btn-backup btn-import" onclick="document.getElementById('importFile').click()">📂 IMPORTA BACKUP</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

<script>
    const isIPhone = /iPhone|iPod|iPad/i.test(navigator.userAgent);
    let lastTapTime = 0;

    let dbs = {
        A: { key: 'flash_v_pc_pro_DATABASE_A', data: [], deck: [], current: null },
        B: { key: 'flash_v_pc_pro_DATABASE_B', data: [], deck: [], current: null },
        C: { key: 'VERBI_PRO_STABLE_V15', data: [], deck: [], current: null }
    };

    function handleTranslationTap(el, t, idx) {
        if (!isIPhone) { togglePause(t, idx); return; }
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTapTime;
        if (tapLength < 300 && tapLength > 0) { togglePause(t, idx); lastTapTime = 0; } 
        else { el.classList.toggle('force-visible'); }
        lastTapTime = currentTime;
    }

    async function getBestTranslation(text, pair) {
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${pair}`);
            const data = await res.json();
            return data.responseData.translatedText.toLowerCase();
        } catch (e) { return ""; }
    }

    async function addNewItem(t) {
        if (t === 'C') {
            const base = document.getElementById('newBaseC').value.trim();
            const full = document.getElementById('newFullC').value.trim();
            const it = document.getElementById('newItC').value.trim();
            if(!base || !full || !it) return;
            dbs.C.data.push({ base, full, it, nextReview: 0, mode: 'en' });
            save('C'); buildDeck('C'); renderTable('C');
            document.getElementById('newBaseC').value = ""; document.getElementById('newFullC').value = ""; document.getElementById('newItC').value = "";
        } else {
            const enInput = document.getElementById('newEn' + t);
            const itInput = document.getElementById('newIt' + t);
            let en = enInput.value.trim();
            let it = itInput.value.trim();

            if (en && !it) {
                showToast("Recupero traduzione...");
                itInput.value = await getBestTranslation(en, 'en|it');
                return; 
            }
            if (!en && it) {
                showToast("Recupero traduzione...");
                enInput.value = await getBestTranslation(it, 'it|en');
                return;
            }
            if (en && it) {
                dbs[t].data.push({ en, it, nextReview: 0, mode: 'en' });
                save(t); buildDeck(t); renderTable(t);
                enInput.value = ""; itInput.value = "";
                showToast("Aggiunto!");
            }
        }
    }

    function formatText(text) { return text ? text.split(',').map(i => i.trim()).join(', ').toUpperCase() : ""; }
    
    function speakItem(text) {
        if (!text) return; window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text.replace(/[/\\|()]/g, ' '));
        msg.lang = 'en-US'; window.speechSynthesis.speak(msg);
    }

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg; t.className = "show";
        setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
    }

    function init() {
        ['A', 'B', 'C'].forEach(t => {
            let saved = localStorage.getItem(dbs[t].key);
            dbs[t].data = saved ? JSON.parse(saved) : [];
            buildDeck(t); t === 'C' ? nextVerb() : nextCard(t); renderTable(t);
        });
    }

    function buildDeck(t) { 
        const now = Date.now();
        dbs[t].deck = dbs[t].data.filter(w => !w.nextReview || now > w.nextReview).sort(() => Math.random() - 0.5);
    }

    function save(t) { localStorage.setItem(dbs[t].key, JSON.stringify(dbs[t].data)); }

    function switchTab(t) {
        document.querySelectorAll('.db-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-a','active-b','active-c'));
        document.getElementById('section' + t).classList.add('active');
        document.getElementById('nav'+t).classList.add('active-'+t.toLowerCase());
        renderTable(t);
    }

    function nextCard(t, keep = false) {
        if (dbs[t].deck.length === 0 && !keep) {
            document.getElementById('display' + t).innerText = "FINITA! ✅";
            document.getElementById('game' + t).style.display = "none";
            document.getElementById('restart' + t).style.display = "inline-block"; return;
        }
        document.getElementById('game' + t).style.display = "block";
        document.getElementById('restart' + t).style.display = "none";
        if(!keep) dbs[t].current = dbs[t].deck.pop();
        const m = dbs[t].current.mode || 'en';
        document.getElementById('gameMode' + t).value = m;
        let showEn = (m === 'en') || (m === 'alt' && dbs[t].current.lastAltState !== 'it');
        document.getElementById('display' + t).innerText = showEn ? dbs[t].current.en : dbs[t].current.it;
        dbs[t].current._target = showEn ? dbs[t].current.it : dbs[t].current.en;
        if(!keep) { document.getElementById('ans' + t).value = ""; document.getElementById('fb' + t).innerText = ""; document.getElementById('check' + t).innerText = "CONTROLLA"; }
        document.getElementById('info' + t).innerText = `RESTANTI: ${dbs[t].deck.length + 1}`;
    }

    function checkGeneric(t) {
        const btn = document.getElementById('check' + t);
        if(btn.innerText === "PROSSIMO") { nextCard(t); return; }
        document.getElementById('fb' + t).innerText = formatText(dbs[t].current._target).replace(/, /g, ',\n');
        btn.innerText = "PROSSIMO";
    }

    function nextVerb(keep = false) {
        if (dbs.C.deck.length === 0 && !keep) {
            document.getElementById('displayC').innerText = "FINITA! ✅";
            document.getElementById('gameC').style.display = "none";
            document.getElementById('restartC').style.display = "inline-block"; return;
        }
        document.getElementById('gameC').style.display = "block";
        document.getElementById('restartC').style.display = "none";
        if(!keep) dbs.C.current = dbs.C.deck.pop();
        const m = dbs.C.current.mode || 'en';
        document.getElementById('gameModeC').value = m;
        let showEn = (m === 'en') || (m === 'alt' && dbs.C.current.lastAltState !== 'it');
        document.getElementById('displayC').innerText = showEn ? dbs.C.current.base : dbs.C.current.it;
        if(!keep) { document.getElementById('ansC').value = ""; document.getElementById('fbC').innerText = ""; document.getElementById('checkC').innerText = "CONTROLLA"; }
        document.getElementById('infoC').innerText = `RESTANTI: ${dbs.C.deck.length + 1}`;
    }

    function checkVerb() {
        const btn = document.getElementById('checkC');
        if(btn.innerText === "PROSSIMO") { nextVerb(); return; }
        const c = dbs.C.current;
        document.getElementById('fbC').innerText = `${formatText(c.full)}\n(${formatText(c.it)})`;
        btn.innerText = "PROSSIMO";
    }

    function renderTable(t) {
        const table = document.getElementById('table' + t);
        const query = document.getElementById('search' + t).value.toLowerCase();
        const now = Date.now();
        table.innerHTML = `<tr><th class="col-idx">#</th><th class="col-main">Principale</th><th class="col-trans">Traduzione</th><th>Modo</th><th>🔊</th><th>✏️</th><th>P/R</th><th>🗑️</th></tr>`;
        dbs[t].data.forEach((w, idx) => {
            const match = (t === 'C' ? w.base : w.en).toLowerCase().includes(query) || w.it.toLowerCase().includes(query);
            if (match) {
                const isP = w.nextReview > now;
                const row = table.insertRow();
                row.innerHTML = `<td class="col-idx">${idx+1}</td>
                <td class="col-main">${isP ? (t==='C'?w.base:w.en)+' (P)' : '<span class="list-active-highlight">'+(t==='C'?w.base:w.en)+'</span>'}</td>
                <td class="col-trans"><span class="hidden-text" onclick="handleTranslationTap(this, '${t}',${idx})">${w.it}</span></td>
                <td><select onchange="updateMode('${t}',${idx},this.value)"><option value="en" ${w.mode==='en'?'selected':''}>En</option><option value="it" ${w.mode==='it'?'selected':''}>Ita</option><option value="alt" ${w.mode==='alt'?'selected':''}>Alt</option></select></td>
                <td><button class="list-btn" style="background:none; font-size:18px;" onclick="speakItem('${(t==='C'?w.full:w.en).replace(/'/g,"\\")}')">🔊</button></td>
                <td><button class="list-btn btn-edit-list" onclick="manualEdit('${t}',${idx})">✏️</button></td>
                <td><button class="list-btn ${isP?'btn-reactivate-list':'btn-postpone-list'}" onclick="togglePause('${t}',${idx})">${isP?'R':'P'}</button></td>
                <td><button class="list-btn btn-trash-list" onclick="manualDelete('${t}',${idx})">🗑️</button></td>`;
            }
        });
    }

    function updateMode(t, i, v) { dbs[t].data[i].mode = v; save(t); renderTable(t); }
    function togglePause(t, i) { let w = (i===undefined)?dbs[t].current:dbs[t].data[i]; if(!w) return; w.nextReview = (w.nextReview > Date.now()) ? 0 : Date.now() + 2592000000; save(t); buildDeck(t); renderTable(t); if(i===undefined) t==='C'?nextVerb():nextCard(t); }
    function manualDelete(t, i) { if(confirm("Eliminare?")) { const idx = (i===undefined)?dbs[t].data.indexOf(dbs[t].current):i; dbs[t].data.splice(idx,1); save(t); buildDeck(t); renderTable(t); if(i===undefined) t==='C'?nextVerb():nextCard(t); } }
    function manualEdit(t, i) { /* Logica Edit Standard */ }
    function exportData() { const blob = new Blob([JSON.stringify({A:dbs.A.data, B:dbs.B.data, C:dbs.C.data})], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup.json`; a.click(); }
    function importData(e) { const reader = new FileReader(); reader.onload = (ev) => { const d = JSON.parse(ev.target.result); dbs.A.data=d.A; dbs.B.data=d.B; dbs.C.data=d.C; save('A'); save('B'); save('C'); location.reload(); }; reader.readAsText(e.target.files[0]); }
    function refreshList(t) { renderTable(t); showToast("Aggiornato!"); }
    function postponeAll(t) { dbs[t].data.forEach(w => w.nextReview = Date.now()+2592000000); save(t); buildDeck(t); renderTable(t); }
    function reactivateAll(t) { dbs[t].data.forEach(w => w.nextReview = 0); save(t); buildDeck(t); renderTable(t); }

    window.onload = init;
</script>
</body>
</html>
