<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcards Pro - V51.9.3</title>
    <style>
        :root { --blue: #007bff; --purple: #6f42c1; --dark-blue: #2c3e50; --bg: #f4f7f9; --text-dark: #2d3436; --deep-blue: #0984e3; --light-gray: #f1f2f6; --red: #e74c3c; --green: #27ae60; --orange: #f39c12; --teal: #00cec9; --grey: #636e72; }
        
        /* Reset per Mobile */
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 80px; color: var(--text-dark); width: 100vw; overflow-x: hidden; }
        
        button, .nav-btn, .list-btn { transition: transform 0.1s ease, opacity 0.1s ease; cursor: pointer; border: none; }
        button:active { transform: scale(0.95); opacity: 0.8; }

        /* Navigazione Adattiva */
        .main-nav { background: #2c3e50; width: 100%; display: flex; justify-content: center; padding: 10px; gap: 8px; position: sticky; top: 0; z-index: 1000; flex-wrap: wrap; }
        .nav-btn { padding: 8px 12px; border-radius: 6px; font-weight: bold; color: white; background: #455a64; font-size: 12px; flex: 1; min-width: 100px; max-width: 150px; }
        .nav-btn.active-a { background: var(--blue); }
        .nav-btn.active-b { background: var(--purple); }
        .nav-btn.active-c { background: var(--dark-blue); border: 1px solid white; }

        /* Card Principale */
        .card { background: white; width: 95%; max-width: 800px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin: 15px 0; border-top: 8px solid #ddd; }
        #sectionA .card { border-color: var(--blue); }
        #sectionB .card { border-color: var(--purple); }
        #sectionC .card { border-color: var(--dark-blue); }

        .word-display { font-size: 28px; font-weight: 800; margin: 20px 0; display: flex; align-items: center; justify-content: center; gap: 10px; min-height: 50px; word-break: break-word; }
        .game-input { width: 100%; max-width: 500px; padding: 15px; border: 2px solid #b2bec3; border-radius: 10px; font-size: 20px; text-align: center; margin-bottom: 10px; }
        
        .feedback-area { width: 100%; max-width: 500px; margin: 0 auto 15px; font-weight: 800; font-size: 22px; color: var(--deep-blue); min-height: 40px; text-align: left; white-space: pre-line; }
        
        .btn-check { width: 100%; max-width: 500px; padding: 15px; border-radius: 10px; font-weight: bold; color: white; background: #2d3436; font-size: 16px; margin-bottom: 15px; }

        .game-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 500px; margin: 0 auto; }
        .btn-act { padding: 12px 5px; border-radius: 8px; color: white; font-weight: bold; font-size: 10px; text-transform: uppercase; }
        .btn-edit { background: var(--grey); }
        .btn-postpone { background: var(--orange); }
        .btn-delete { background: var(--red); }

        /* Sezioni Database */
        .db-section { display: none; width: 100%; flex-direction: column; align-items: center; }
        .db-section.active { display: flex; }

        /* Input Aggiunta */
        .add-container { width: 95%; max-width: 800px; background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #eee; }
        .add-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .btn-add { background: var(--green); color: white; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; }

        /* Ricerca e Tool */
        .search-container { width: 95%; max-width: 800px; margin-bottom: 15px; display: flex; gap: 5px; flex-wrap: wrap; }
        .search-input { flex: 1; min-width: 200px; padding: 12px; border-radius: 10px; border: 1px solid #dfe6e9; }
        .btn-tool { padding: 10px; border-radius: 8px; color: white; font-size: 10px; flex: 1; }
        
        /* Tabella Listati */
        .admin-panel { background: white; width: 95%; max-width: 800px; border-radius: 15px; margin-bottom: 30px; overflow: hidden; border: 1px solid #dfe6e9; }
        .list-header { padding: 15px; background: #f8f9fa; font-weight: bold; font-size: 14px; border-bottom: 1px solid #eee; }
        
        /* SCORRIMENTO SOLO PER TABELLA */
        .scroll-area { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; min-width: 800px; border-collapse: collapse; table-layout: fixed; }
        th { background: #2d3436; color: white; padding: 12px 5px; font-size: 10px; text-transform: uppercase; position: sticky; top: 0; }
        td { padding: 10px 5px; border-bottom: 1px solid #eee; font-size: 13px; text-align: center; overflow: hidden; text-overflow: ellipsis; }
        
        .col-idx { width: 35px; }
        .col-main { width: 180px; text-align: left !important; font-weight: bold; }
        .col-trans { width: 250px; text-align: left !important; }

        .hidden-text { background: #eee; color: transparent; padding: 5px; border-radius: 4px; filter: blur(4px); cursor: pointer; display: block; }
        .hidden-text:active, .hidden-text:hover { filter: blur(0); color: var(--deep-blue); background: #e3f2fd; }

        /* Footer */
        .backup-footer { width: 95%; max-width: 800px; padding: 20px; border-top: 2px dashed #ccc; display: flex; flex-direction: column; gap: 10px; }
        .btn-backup { padding: 15px; border-radius: 10px; color: white; font-weight: bold; width: 100%; }

        #toast { visibility: hidden; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 20px; z-index: 3000; font-size: 14px; }
        #toast.show { visibility: visible; animation: fadein 0.5s; }

        @media (min-width: 600px) {
            .add-container { flex-direction: row; }
            .backup-footer { flex-direction: row; }
            .btn-act { font-size: 12px; }
        }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 20px; opacity: 1;} }
    </style>
</head>
<body>

    <div id="toast">Operazione completata!</div>

    <nav class="main-nav">
        <button id="navA" class="nav-btn active-a" onclick="switchTab('A')">DB 1</button>
        <button id="navB" class="nav-btn" onclick="switchTab('B')">Grammar</button>
        <button id="navC" class="nav-btn" onclick="switchTab('C')">Verbi Irreg.</button>
    </nav>

    <section id="sectionA" class="db-section active">
        <div class="card">
            <div class="card-header">
                <div id="infoA" style="font-size:12px; font-weight:bold; color:var(--blue);"></div>
                <select id="gameModeA" class="card-mode-selector" onchange="syncFromGame('A')">
                    <option value="en">Solo Eng</option>
                    <option value="it">Solo Ita</option>
                    <option value="alt">Modalità Alt</option>
                </select>
            </div>
            <div class="word-display"><span id="displayA">...</span><button onclick="speakItem(dbs.A.current.en)" style="background:none; font-size:24px;">🔊</button></div>
            <div id="gameA">
                <input type="text" id="ansA" class="game-input" placeholder="Traduci..." autocomplete="off">
                <div id="fbA" class="feedback-area"></div>
                <button id="checkA" class="btn-check" onclick="checkGeneric('A')">CONTROLLA</button>
                <div class="game-controls">
                    <button class="btn-act btn-edit" onclick="manualEdit('A')">Edit</button>
                    <button class="btn-act btn-postpone" onclick="togglePause('A')">Pausa</button>
                    <button class="btn-act btn-delete" onclick="manualDelete('A')">Elimina</button>
                </div>
            </div>
            <button id="restartA" style="display:none; background:var(--green); color:white; padding:15px; border-radius:10px; width:100%; margin-top:10px;" onclick="restartSession('A')">RICOMINCIA 🔄</button>
        </div>
        <div class="add-container"><input type="text" id="newEnA" class="add-input" placeholder="Inglese"><input type="text" id="newItA" class="add-input" placeholder="Italiano"><button class="btn-add" onclick="addNewItem('A')">AGGIUNGI</button></div>
        <div class="search-container">
            <input type="text" id="searchA" class="search-input" placeholder="Cerca..." oninput="renderTable('A')">
            <button class="btn-tool" style="background:var(--grey)" onclick="renderTable('A')">🔄</button>
            <button class="btn-tool" style="background:var(--blue)" onclick="forceAltRotation('A')">ALT 🔄</button>
        </div>
        <div class="admin-panel"><div class="list-header">Lista Database 1 (Scorri ➔)</div><div class="scroll-area"><table id="tableA"></table></div></div>
    </section>

    <section id="sectionB" class="db-section">
        <div class="card">
            <div class="card-header">
                <div id="infoB" style="font-size:12px; font-weight:bold; color:var(--purple);"></div>
                <select id="gameModeB" class="card-mode-selector" onchange="syncFromGame('B')">
                    <option value="en">Solo Eng</option><option value="it">Solo Ita</option><option value="alt">Modalità Alt</option>
                </select>
            </div>
            <div class="word-display"><span id="displayB">...</span><button onclick="speakItem(dbs.B.current.en)" style="background:none; font-size:24px;">🔊</button></div>
            <div id="gameB">
                <input type="text" id="ansB" class="game-input" placeholder="Traduci..." autocomplete="off">
                <div id="fbB" class="feedback-area"></div>
                <button id="checkB" class="btn-check" style="background:var(--purple)" onclick="checkGeneric('B')">CONTROLLA</button>
                <div class="game-controls">
                    <button class="btn-act btn-edit" onclick="manualEdit('B')">Edit</button>
                    <button class="btn-act btn-postpone" onclick="togglePause('B')">Pausa</button>
                    <button class="btn-act btn-delete" onclick="manualDelete('B')">Elimina</button>
                </div>
            </div>
            <button id="restartB" style="display:none; background:var(--green); color:white; padding:15px; border-radius:10px; width:100%; margin-top:10px;" onclick="restartSession('B')">RICOMINCIA 🔄</button>
        </div>
        <div class="add-container"><input type="text" id="newEnB" class="add-input" placeholder="Inglese"><input type="text" id="newItB" class="add-input" placeholder="Italiano"><button class="btn-add" style="background:var(--purple)" onclick="addNewItem('B')">AGGIUNGI</button></div>
        <div class="search-container"><input type="text" id="searchB" class="search-input" placeholder="Cerca..." oninput="renderTable('B')"><button class="btn-tool" style="background:var(--purple)" onclick="forceAltRotation('B')">ALT 🔄</button></div>
        <div class="admin-panel"><div class="list-header">Lista Grammar (Scorri ➔)</div><div class="scroll-area"><table id="tableB"></table></div></div>
    </section>

    <section id="sectionC" class="db-section">
        <div class="card">
            <div class="card-header">
                <div id="infoC" style="font-size:12px; font-weight:bold; color:var(--dark-blue);"></div>
                <select id="gameModeC" class="card-mode-selector" onchange="syncFromGame('C')">
                    <option value="en">Eng -> Ita</option><option value="it">Ita -> Eng</option><option value="alt">Modalità Alt</option>
                </select>
            </div>
            <div class="word-display"><span id="displayC">...</span><button id="speakBtnC" style="background:none; font-size:24px;">🔊</button></div>
            <div id="gameC">
                <input type="text" id="ansC" class="game-input" placeholder="Risposta..." autocomplete="off">
                <div id="fbC" class="feedback-area"></div>
                <button id="checkC" class="btn-check" style="background:var(--dark-blue)" onclick="checkVerb()">CONTROLLA</button>
                <div class="game-controls">
                    <button class="btn-act btn-edit" onclick="manualEdit('C')">Edit</button>
                    <button class="btn-act btn-postpone" onclick="togglePause('C')">Pausa</button>
                    <button class="btn-act btn-delete" onclick="manualDelete('C')">Elimina</button>
                </div>
            </div>
            <button id="restartC" style="display:none; background:var(--green); color:white; padding:15px; border-radius:10px; width:100%; margin-top:10px;" onclick="restartSession('C')">RICOMINCIA 🔄</button>
        </div>
        <div class="add-container"><input type="text" id="newBaseC" class="add-input" placeholder="Base"><input type="text" id="newFullC" class="add-input" placeholder="Paradigma"><input type="text" id="newItC" class="add-input" placeholder="Traduzione"><button class="btn-add" style="background:var(--dark-blue)" onclick="addNewItem('C')">AGGIUNGI</button></div>
        <div class="search-container"><input type="text" id="searchC" class="search-input" placeholder="Cerca..." oninput="renderTable('C')"><button class="btn-tool" style="background:var(--dark-blue)" onclick="forceAltRotation('C')">ALT 🔄</button></div>
        <div class="admin-panel"><div class="list-header">Lista Verbi (Scorri ➔)</div><div class="scroll-area"><table id="tableC"></table></div></div>
    </section>

    <div class="backup-footer">
        <button class="btn-backup btn-export" onclick="exportData()">💾 ESPORTA BACKUP</button>
        <button class="btn-backup btn-import" onclick="document.getElementById('importFile').click()">📂 IMPORTA BACKUP</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

<script>
    let dbs = {
        A: { key: 'flash_v_pc_pro_DATABASE_A', data: [], deck: [], current: null },
        B: { key: 'flash_v_pc_pro_DATABASE_B', data: [], deck: [], current: null },
        C: { key: 'VERBI_PRO_STABLE_V15', data: [], deck: [], current: null }
    };

    function formatText(text) { return text ? text.split(',').map(i => i.trim()).join(', ').toUpperCase() : ""; }
    function speakItem(text) { if(!text) return; window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(text.replace(/[/\\|()]/g, ' ')); msg.lang = 'en-US'; window.speechSynthesis.speak(msg); }
    function showToast(msg) { const t = document.getElementById("toast"); t.innerText = msg; t.className = "show"; setTimeout(() => t.className = "", 3000); }

    function save(t) { localStorage.setItem(dbs[t].key, JSON.stringify(dbs[t].data)); }
    function init() { ['A', 'B', 'C'].forEach(t => { const s = localStorage.getItem(dbs[t].key); dbs[t].data = s ? JSON.parse(s) : []; buildDeck(t); t === 'C' ? nextVerb() : nextCard(t); renderTable(t); }); }
    function buildDeck(t) { const now = Date.now(); dbs[t].deck = dbs[t].data.filter(w => !w.nextReview || now > w.nextReview).sort(() => Math.random() - 0.5); }

    function switchTab(t) {
        document.querySelectorAll('.db-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-a','active-b','active-c'));
        document.getElementById('section' + t).classList.add('active');
        document.getElementById('nav'+t).classList.add('active-'+t.toLowerCase());
        renderTable(t);
    }

    function nextCard(t, keep = false) {
        const game = document.getElementById('game'+t), rest = document.getElementById('restart'+t), disp = document.getElementById('display'+t);
        if(dbs[t].deck.length === 0 && !keep && !dbs[t].current) { disp.innerText = "FINITA! ✅"; game.style.display="none"; rest.style.display="block"; return; }
        game.style.display="block"; rest.style.display="none";
        if(!keep) dbs[t].current = dbs[t].deck.pop();
        const mode = document.getElementById('gameMode'+t).value = dbs[t].current.mode || 'en';
        const showEn = mode === 'en' || (mode === 'alt' && dbs[t].current.lastAltState !== 'it');
        disp.innerText = showEn ? dbs[t].current.en : dbs[t].current.it;
        dbs[t].current._target = showEn ? dbs[t].current.it : dbs[t].current.en;
        if(!keep) { document.getElementById('ans'+t).value = ""; document.getElementById('fb'+t).innerText = ""; document.getElementById('check'+t).innerText = "CONTROLLA"; }
        document.getElementById('info'+t).innerText = `RIMANENTI: ${dbs[t].deck.length + (dbs[t].current?1:0)}`;
    }

    function checkGeneric(t) {
        const btn = document.getElementById('check'+t);
        if(btn.innerText === "PROSSIMO") { nextCard(t); return; }
        document.getElementById('fb'+t).innerText = formatText(dbs[t].current._target);
        btn.innerText = "PROSSIMO";
    }

    function nextVerb(keep = false) {
        const game = document.getElementById('gameC'), rest = document.getElementById('restartC'), disp = document.getElementById('displayC');
        if(dbs.C.deck.length === 0 && !keep && !dbs.C.current) { disp.innerText = "FINITA! ✅"; game.style.display="none"; rest.style.display="block"; return; }
        game.style.display="block"; rest.style.display="none";
        if(!keep) dbs.C.current = dbs.C.deck.pop();
        const mode = document.getElementById('gameModeC').value = dbs.C.current.mode || 'en';
        const showEn = mode === 'en' || (mode === 'alt' && dbs.C.current.lastAltState !== 'it');
        disp.innerText = showEn ? dbs.C.current.base : dbs.C.current.it;
        document.getElementById('speakBtnC').onclick = () => speakItem(dbs.C.current.full);
        if(!keep) { document.getElementById('ansC').value = ""; document.getElementById('fbC').innerText = ""; document.getElementById('checkC').innerText = "CONTROLLA"; }
        document.getElementById('infoC').innerText = `RIMANENTI: ${dbs.C.deck.length + (dbs.C.current?1:0)}`;
    }

    function checkVerb() {
        const btn = document.getElementById('checkC');
        if(btn.innerText === "PROSSIMO") { nextVerb(); return; }
        const mode = document.getElementById('gameModeC').value;
        const showingIta = (mode === 'it') || (mode === 'alt' && dbs.C.current.lastAltState === 'it');
        document.getElementById('fbC').innerText = showingIta ? `${formatText(dbs.C.current.base)} - ${formatText(dbs.C.current.full)}` : `${formatText(dbs.C.current.full)}\n(${formatText(dbs.C.current.it)})`;
        btn.innerText = "PROSSIMO";
    }

    function renderTable(t) {
        const table = document.getElementById('table'+t), q = document.getElementById('search'+t).value.toLowerCase();
        table.innerHTML = `<tr><th class="col-idx">#</th><th class="col-main">Parola</th><th class="col-trans">Traduzione</th><th>P/R</th><th>🗑️</th></tr>`;
        dbs[t].data.forEach((w, i) => {
            if((t==='C'?w.base:w.en).toLowerCase().includes(q) || w.it.toLowerCase().includes(q)) {
                const isP = w.nextReview > Date.now();
                const r = table.insertRow();
                r.innerHTML = `<td>${i+1}</td><td class="col-main">${t==='C'?w.base:w.en}${isP?' (P)':''}</td><td><span class="hidden-text">${w.it}</span></td>
                <td><button onclick="togglePause('${t}',${i})" style="background:${isP?'#27ae60':'#f39c12'}; color:white; border-radius:4px; padding:5px;">${isP?'R':'P'}</button></td>
                <td><button onclick="manualDelete('${t}',${i})" style="background:#e74c3c; color:white; border-radius:4px; padding:5px;">🗑️</button></td>`;
            }
        });
    }

    function syncFromGame(t) { if(dbs[t].current) { dbs[t].current.mode = document.getElementById('gameMode'+t).value; save(t); t==='C'?nextVerb(true):nextCard(t,true); } }
    function forceAltRotation(t) { dbs[t].data.forEach(w => w.lastAltState = w.lastAltState === 'it' ? 'en' : 'it'); save(t); buildDeck(t); t==='C'?nextVerb():nextCard(t); renderTable(t); }

    function exportData() { 
        const blob = new Blob([JSON.stringify({A: dbs.A.data, B: dbs.B.data, C: dbs.C.data})], {type:'text/plain'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "backup_flashcards.txt"; a.click();
    }
    function importData(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const imp = JSON.parse(ev.target.result);
            if(confirm("Sovrascrivere dati?")) { dbs.A.data=imp.A; dbs.B.data=imp.B; dbs.C.data=imp.C; ['A','B','C'].forEach(save); location.reload(); }
        };
        reader.readAsText(e.target.files[0]);
    }

    function togglePause(t, i) { let w = (i===undefined)?dbs[t].current:dbs[t].data[i]; if(!w) return; w.nextReview = (w.nextReview > Date.now()) ? 0 : Date.now() + 2592000000; save(t); buildDeck(t); renderTable(t); if(i===undefined) t==='C'?nextVerb():nextCard(t); }
    function manualDelete(t, i) { if(confirm("Eliminare?")) { const idx = (i===undefined)?dbs[t].data.indexOf(dbs[t].current):i; dbs[t].data.splice(idx,1); save(t); buildDeck(t); renderTable(t); if(i===undefined) t==='C'?nextVerb():nextCard(t); } }
    function addNewItem(t) {
        if(t==='C') {
            const b=document.getElementById('newBaseC').value, f=document.getElementById('newFullC').value, i=document.getElementById('newItC').value;
            if(b && f && i) { dbs.C.data.push({base:b, full:f, it:i, nextReview:0, lastAltState:'en'}); document.getElementById('newBaseC').value=document.getElementById('newFullC').value=document.getElementById('newItC').value=""; }
        } else {
            const e=document.getElementById('newEn'+t).value, i=document.getElementById('newIt'+t).value;
            if(e && i) { dbs[t].data.push({en:e, it:i, nextReview:0, lastAltState:'en'}); document.getElementById('newEn'+t).value=document.getElementById('newIt'+t).value=""; }
        }
        save(t); buildDeck(t); renderTable(t);
    }
    function restartSession(t) { forceAltRotation(t); }

    init();
</script>
</body>
</html>
