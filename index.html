<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcards Pro - V51.9.4</title>
    <style>
        :root { --blue: #007bff; --purple: #6f42c1; --dark-blue: #2c3e50; --bg: #f4f7f9; --text-dark: #2d3436; --deep-blue: #0984e3; --light-gray: #f1f2f6; --red: #e74c3c; --green: #27ae60; --orange: #f39c12; --teal: #00cec9; --grey: #636e72; --pink: #d63031; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 80px; color: var(--text-dark); overflow-x: hidden; width: 100vw; }
        button, .nav-btn, .list-btn { transition: transform 0.1s ease, opacity 0.1s ease; outline: none; cursor: pointer; border: none; }
        button:active, .nav-btn:active, .list-btn:active { transform: scale(0.92); opacity: 0.7; }
        .main-nav { background: #2c3e50; width: 100%; display: flex; justify-content: center; padding: 12px 0; gap: 15px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); flex-wrap: wrap; }
        .nav-btn { padding: 10px 20px; border-radius: 6px; font-weight: bold; color: white; background: #455a64; font-size: 14px; }
        .nav-btn.active-a { background: var(--blue); }
        .nav-btn.active-d { background: var(--pink); }
        .nav-btn.active-b { background: var(--purple); }
        .nav-btn.active-c { background: var(--dark-blue); border: 1px solid white; }
        
        .card { background: white; width: 100%; max-width: 1000px; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin-bottom: 25px; border-top: 8px solid #ddd; box-sizing: border-box; }
        #sectionA .card { border-color: var(--blue); }
        #sectionD .card { border-color: var(--pink); }
        #sectionB .card { border-color: var(--purple); }
        #sectionC .card { border-color: var(--dark-blue); }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 10px; }
        .card-mode-selector { padding: 5px 10px; border-radius: 8px; border: 1px solid #ddd; background: #f8f9fa; font-size: 13px; font-weight: bold; color: var(--text-dark); outline: none; }

        .word-display { font-size: 34px; font-weight: 800; margin: 25px auto; display: flex; align-items: center; justify-content: center; gap: 15px; min-height: 60px; color: #1a1a1a; word-break: break-word; width: 90%; }
        .speaker-btn { background: none; font-size: 30px; cursor: pointer; border: none; padding: 5px; }
        
        .input-group { display: flex; width: 85%; max-width: 850px; margin: 0 auto 10px auto; gap: 10px; }
        .game-input { flex: 1; padding: 18px; border: 2px solid #b2bec3; border-radius: 10px; font-size: 22px; text-align: center; outline: none; box-sizing: border-box; }
        .btn-check { width: 180px; border-radius: 10px; font-weight: bold; color: white; background: #2d3436; font-size: 16px; text-transform: uppercase; }
        
        .feedback-area { margin: 10px auto; width: 85%; min-height: 45px; font-weight: 900; font-size: 26px; text-align: left; white-space: pre-line; }

        .game-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 85%; max-width: 850px; margin: 0 auto; }
        .btn-act { padding: 14px; border-radius: 8px; color: white; font-weight: bold; font-size: 14px; text-transform: uppercase; }

        .admin-panel { background: white; width: 100%; max-width: 1200px; border-radius: 15px; border: 1px solid #dfe6e9; margin-bottom: 30px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .scroll-area { max-height: 800px; overflow-y: auto; overflow-x: auto; }
        table { width: 100%; min-width: 1000px; border-collapse: collapse; }
        th { background: #2d3436; padding: 15px; color: white; font-size: 11px; text-transform: uppercase; position: sticky; top: 0; z-index: 10; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; vertical-align: middle; }
        
        .col-main { text-align: left !important; font-weight: bold; width: 250px; padding-left: 20px !important; }
        .col-mode { width: 130px; }
        .col-trans { text-align: left !important; }

        .list-mode-select { padding: 5px; border-radius: 4px; font-size: 12px; border: 1px solid #ccc; width: 100%; background: #fff; }
        .hidden-text { background: var(--light-gray); padding: 8px; border-radius: 6px; cursor: pointer; display: block; filter: blur(4px); transition: 0.2s; border: 1px solid #ddd; }
        tr:hover .hidden-text { filter: blur(0); background: var(--deep-blue); color: white; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 600px; }
        .modal-field { margin-bottom: 15px; }
        .modal-field textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; box-sizing: border-box; }

        .add-container { width: 100%; max-width: 1200px; background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; gap: 10px; border: 1px solid #eee; }
        .add-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }

        .search-container { width: 100%; max-width: 1200px; margin-bottom: 15px; display: flex; gap: 8px; }
        .search-input { flex-grow: 1; padding: 12px; border-radius: 10px; border: 1px solid #dfe6e9; }
        
        .btn-restart { background: var(--green); color: white; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 20px; display: none; width: 85%; }

        #toast { visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 15px 30px; border-radius: 8px; z-index: 4000; font-weight: bold; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div id="toast">Operazione completata!</div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Modifica Elemento</h3>
            <div id="fieldsA">
                <div class="modal-field"><label>Inglese:</label><textarea id="editEn"></textarea></div>
                <div class="modal-field"><label>Italiano:</label><textarea id="editIt"></textarea></div>
            </div>
            <div id="fieldsC" style="display:none">
                <div class="modal-field"><label>Base:</label><textarea id="editBaseC"></textarea></div>
                <div class="modal-field"><label>Paradigma:</label><textarea id="editFullC"></textarea></div>
                <div class="modal-field"><label>Traduzione:</label><textarea id="editItC"></textarea></div>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <button onclick="closeModal()" style="background:var(--grey); color:white; padding:10px 20px; border-radius:5px;">Annulla</button>
                <button onclick="saveModal()" style="background:var(--green); color:white; padding:10px 20px; border-radius:5px;">Salva</button>
            </div>
        </div>
    </div>

    <nav class="main-nav">
        <button id="navA" class="nav-btn active-a" onclick="switchTab('A')">Database 1</button>
        <button id="navD" class="nav-btn" onclick="switchTab('D')">Database 2</button>
        <button id="navB" class="nav-btn" onclick="switchTab('B')">Lesson and Grammar</button>
        <button id="navC" class="nav-btn" onclick="switchTab('C')">Verbi Irregolari</button>
    </nav>

    <script>
        const config = [
            { id: 'A', name: 'Database 1', color: 'var(--blue)', btnClass: 'active-a' },
            { id: 'D', name: 'Database 2', color: 'var(--pink)', btnClass: 'active-d' },
            { id: 'B', name: 'Lesson and Grammar', color: 'var(--purple)', btnClass: 'active-b' }
        ];

        config.forEach(s => {
            document.write(`
            <section id="section${s.id}" class="db-section" style="display:${s.id === 'A' ? 'flex' : 'none'}; flex-direction:column; align-items:center; width:100%; padding:20px 0;">
                <div class="card">
                    <div class="card-header">
                        <div id="info${s.id}" style="font-weight:bold; color:${s.color};"></div>
                        <select id="gameMode${s.id}" class="card-mode-selector" onchange="syncFromGame('${s.id}')">
                            <option value="en">Solo Eng</option>
                            <option value="it">Solo Ita</option>
                            <option value="alt">Modalità Alt</option>
                        </select>
                    </div>
                    <div class="word-display">
                        <span id="display${s.id}">...</span>
                        <button class="speaker-btn" onclick="speakCurrent('${s.id}')">🔊</button>
                    </div>
                    <div id="game${s.id}">
                        <div class="input-group">
                            <input type="text" id="ans${s.id}" class="game-input" placeholder="Traduci..." autocomplete="off">
                            <button id="check${s.id}" class="btn-check" onclick="checkGeneric('${s.id}')" style="background:${s.color}">CONTROLLA</button>
                        </div>
                        <div id="fb${s.id}" class="feedback-area"></div>
                        <div class="game-controls">
                            <button class="btn-act" style="background:var(--grey)" onclick="manualEdit('${s.id}')">Modifica</button>
                            <button class="btn-act" style="background:var(--orange)" onclick="togglePause('${s.id}')">Posticipa</button>
                            <button class="btn-act" style="background:var(--red)" onclick="manualDelete('${s.id}')">Elimina</button>
                        </div>
                    </div>
                    <button id="restart${s.id}" class="btn-restart" onclick="restartSession('${s.id}')">RICOMINCIA SESSIONE 🔄</button>
                </div>

                <div class="add-container">
                    <input type="text" id="newEn${s.id}" class="add-input" placeholder="Inglese">
                    <input type="text" id="newIt${s.id}" class="add-input" placeholder="Italiano">
                    <button onclick="addNewItem('${s.id}')" style="background:${s.color}; color:white; padding:10px 20px; border-radius:6px; font-weight:bold;">AGGIUNGI +</button>
                </div>

                <div class="search-container">
                    <input type="text" id="search${s.id}" class="search-input" placeholder="Cerca..." oninput="renderTable('${s.id}')">
                </div>

                <div class="admin-panel">
                    <div class="scroll-area"><table id="table${s.id}"></table></div>
                </div>
            </section>
            `);
        });
    </script>

    <section id="sectionC" class="db-section" style="display:none; flex-direction:column; align-items:center; width:100%; padding:20px 0;">
        <div class="card">
            <div class="card-header">
                <div id="infoC" style="font-weight:bold; color:var(--dark-blue);"></div>
                <select id="gameModeC" class="card-mode-selector" onchange="syncFromGame('C')">
                    <option value="en">Eng -> Ita</option>
                    <option value="it">Ita -> Eng</option>
                    <option value="alt">Modalità Alt</option>
                </select>
            </div>
            <div class="word-display">
                <span id="displayC">...</span>
                <button class="speaker-btn" onclick="speakCurrent('C')">🔊</button>
            </div>
            <div id="gameC">
                <div class="input-group">
                    <input type="text" id="ansC" class="game-input" placeholder="Paradigma o Traduzione...">
                    <button id="checkC" class="btn-check" onclick="checkVerb()" style="background:var(--dark-blue)">CONTROLLA</button>
                </div>
                <div id="fbC" class="feedback-area"></div>
            </div>
            <button id="restartC" class="btn-restart" onclick="restartSession('C')">RICOMINCIA 🔄</button>
        </div>
        <div class="admin-panel">
            <div class="scroll-area"><table id="tableC"></table></div>
        </div>
    </section>

    <div style="padding:20px; display:flex; gap:10px; margin-top:20px;">
        <button onclick="exportData()" style="background:#2d3436; color:white; padding:15px; border-radius:8px;">💾 ESPORTA BACKUP</button>
        <button onclick="document.getElementById('importFile').click()" style="background:#636e72; color:white; padding:15px; border-radius:8px;">📂 IMPORTA FILE</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

<script>
    // CAMBIA QUESTO ID PER OGNI SITO DIVERSO
    const APP_ID = "DATABASE_SET_1"; 

    let dbs = {
        A: { key: APP_ID + '_DB_A', data: [], deck: [], current: null },
        D: { key: APP_ID + '_DB_D', data: [], deck: [], current: null },
        B: { key: APP_ID + '_DB_B', data: [], deck: [], current: null },
        C: { key: APP_ID + '_DB_C', data: [], deck: [], current: null }
    };

    let currentEdit = { t: null, i: null };

    function init() {
        ['A', 'D', 'B', 'C'].forEach(t => {
            const saved = localStorage.getItem(dbs[t].key);
            dbs[t].data = saved ? JSON.parse(saved) : [];
            buildDeck(t);
            t === 'C' ? nextVerb() : nextCard(t);
            renderTable(t);
        });
    }

    function buildDeck(t) {
        const now = Date.now();
        dbs[t].deck = dbs[t].data.filter(w => !w.nextReview || now > w.nextReview).sort(() => Math.random() - 0.5);
    }

    function nextCard(t, keep = false) {
        const gameDiv = document.getElementById('game' + t);
        const restartBtn = document.getElementById('restart' + t);
        
        if (dbs[t].deck.length === 0 && !keep) {
            gameDiv.style.display = "none";
            restartBtn.style.display = "block";
            document.getElementById('display' + t).innerText = "COMPLETATO! ✅";
            return;
        }

        gameDiv.style.display = "block";
        restartBtn.style.display = "none";

        if (!keep) dbs[t].current = dbs[t].deck.pop();
        if (!dbs[t].current) return;

        const mode = dbs[t].current.mode || 'alt';
        let showEn = (mode === 'en') || (mode === 'alt' && dbs[t].current.lastAltState !== 'it');
        if(mode === 'it') showEn = false;

        document.getElementById('display' + t).innerText = showEn ? dbs[t].current.en.toUpperCase() : dbs[t].current.it.toUpperCase();
        dbs[t].current._target = showEn ? dbs[t].current.it : dbs[t].current.en;
        
        if(!keep) {
            document.getElementById('ans' + t).value = "";
            document.getElementById('fb' + t).innerText = "";
            document.getElementById('check' + t).innerText = "CONTROLLA";
        }
        document.getElementById('info' + t).innerText = `RESTANTI: ${dbs[t].deck.length + 1}`;
    }

    function checkGeneric(t) {
        const btn = document.getElementById('check' + t), ans = document.getElementById('ans' + t), fb = document.getElementById('fb' + t);
        if (btn.innerText === "AVANTI") { nextCard(t); return; }

        const user = ans.value.trim().toLowerCase();
        const targets = dbs[t].current._target.split(',').map(x => x.trim().toLowerCase());

        if (targets.includes(user)) {
            fb.innerText = "CORRETTO! 🎉"; fb.style.color = "var(--green)";
            if(dbs[t].current.mode === 'alt') dbs[t].current.lastAltState = (dbs[t].current.lastAltState === 'it') ? 'en' : 'it';
            save(t); btn.innerText = "AVANTI";
        } else {
            fb.innerHTML = `SBAGLIATO! ❌\nEra: ${dbs[t].current._target.toUpperCase()}`; fb.style.color = "var(--red)";
        }
    }

    function renderTable(t) {
        const table = document.getElementById('table' + t);
        const query = document.getElementById('search' + t)?.value.toLowerCase() || "";
        let html = `<tr><th class="col-idx">#</th><th class="col-main">PAROLA / AUDIO</th><th class="col-mode">MODALITÀ</th><th class="col-trans">TRADUZIONE / AZIONI</th></tr>`;
        
        dbs[t].data.forEach((item, i) => {
            const searchStr = (t==='C' ? item.base+item.it : item.en+item.it).toLowerCase();
            if (query && !searchStr.includes(query)) return;

            const isPaused = item.nextReview > Date.now();
            html += `<tr style="${isPaused ? 'opacity:0.5' : ''}">
                <td>${i+1}</td>
                <td class="col-main">
                    <button onclick="speakItem('${t==='C'?item.full:item.en}')" style="background:none; border:none; cursor:pointer; font-size:18px; margin-right:8px;">🔊</button>
                    ${(t==='C'?item.base:item.en).toUpperCase()}
                </td>
                <td class="col-mode">
                    <select class="list-mode-select" onchange="updateItemMode('${t}', ${i}, this.value)">
                        <option value="en" ${item.mode==='en'?'selected':''}>Solo Eng</option>
                        <option value="it" ${item.mode==='it'?'selected':''}>Solo Ita</option>
                        <option value="alt" ${item.mode==='alt'?'selected':''}>Alt</option>
                    </select>
                </td>
                <td class="col-trans">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span class="hidden-text" style="flex:1" onclick="this.style.filter='none'">${(t==='C'?item.full+' - '+item.it : item.it).toUpperCase()}</span>
                        <button class="list-btn" style="background:var(--grey)" onclick="manualEdit('${t}', ${i})">✎</button>
                        <button class="list-btn" style="background:var(--red)" onclick="manualDelete('${t}', ${i})">🗑</button>
                    </div>
                </td>
            </tr>`;
        });
        table.innerHTML = html;
    }

    function updateItemMode(t, i, val) {
        dbs[t].data[i].mode = val;
        save(t);
        showToast("Modalità aggiornata");
    }

    function speakCurrent(t) {
        const text = (t === 'C') ? dbs.C.current.full : dbs[t].current.en;
        speakItem(text);
    }

    function speakItem(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text.replace(/[/\\|()]/g, ' '));
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function addNewItem(t) {
        const en = document.getElementById('newEn' + t).value.trim(), it = document.getElementById('newIt' + t).value.trim();
        if(!en || !it) return;
        const newItem = { en, it, nextReview: 0, mode: 'alt', lastAltState: 'en' };
        dbs[t].data.push(newItem);
        dbs[t].deck.push(newItem);
        save(t); renderTable(t);
        document.getElementById('newEn' + t).value = ""; document.getElementById('newIt' + t).value = "";
        showToast("Aggiunto!");
    }

    function togglePause(t) {
        if(!dbs[t].current) return;
        dbs[t].current.nextReview = Date.now() + (24 * 60 * 60 * 1000);
        save(t); nextCard(t); showToast("Posticipato di 24h");
    }

    function manualEdit(t, i) {
        let item = (i === undefined) ? dbs[t].current : dbs[t].data[i];
        if(!item) return;
        currentEdit = { t, i };
        document.getElementById('editModal').style.display = 'flex';
        if (t === 'C') {
            document.getElementById('fieldsA').style.display = 'none';
            document.getElementById('fieldsC').style.display = 'block';
            document.getElementById('editBaseC').value = item.base;
            document.getElementById('editFullC').value = item.full;
            document.getElementById('editItC').value = item.it;
        } else {
            document.getElementById('fieldsC').style.display = 'none';
            document.getElementById('fieldsA').style.display = 'block';
            document.getElementById('editEn').value = item.en;
            document.getElementById('editIt').value = item.it;
        }
    }

    function saveModal() {
        const { t, i } = currentEdit;
        let item = (i === undefined) ? dbs[t].current : dbs[t].data[i];
        if (t === 'C') {
            item.base = document.getElementById('editBaseC').value.trim();
            item.full = document.getElementById('editFullC').value.trim();
            item.it = document.getElementById('editItC').value.trim();
        } else {
            item.en = document.getElementById('editEn').value.trim();
            item.it = document.getElementById('editIt').value.trim();
        }
        save(t); renderTable(t); closeModal();
        if(i === undefined) t === 'C' ? nextVerb(true) : nextCard(t, true);
    }

    function manualDelete(t, i) {
        if(!confirm("Eliminare definitivamente?")) return;
        if(i === undefined) {
            dbs[t].data = dbs[t].data.filter(x => x !== dbs[t].current);
            dbs[t].current = null;
            t === 'C' ? nextVerb() : nextCard(t);
        } else {
            dbs[t].data.splice(i, 1);
        }
        save(t); renderTable(t);
    }

    function save(t) { localStorage.setItem(dbs[t].key, JSON.stringify(dbs[t].data)); }
    function closeModal() { document.getElementById('editModal').style.display = 'none'; }
    function showToast(m) { const s = document.getElementById('toast'); s.innerText = m; s.classList.add('show'); setTimeout(() => s.classList.remove('show'), 3000); }
    
    function switchTab(t) {
        document.querySelectorAll('.db-section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-a','active-b','active-c','active-d'));
        document.getElementById('section' + t).style.display = 'flex';
        document.getElementById('nav'+t).classList.add('active-'+t.toLowerCase());
        renderTable(t);
    }

    function restartSession(t) {
        buildDeck(t);
        t === 'C' ? nextVerb() : nextCard(t);
    }

    // Gestione Verbi C specifica
    function nextVerb(keep=false) {
        const gameDiv = document.getElementById('gameC'), restartBtn = document.getElementById('restartC');
        if (dbs.C.deck.length === 0 && !keep) {
            gameDiv.style.display = "none"; restartBtn.style.display = "block";
            document.getElementById('displayC').innerText = "FINITO! ✅"; return;
        }
        gameDiv.style.display = "block"; restartBtn.style.display = "none";
        if(!keep) dbs.C.current = dbs.C.deck.pop();
        document.getElementById('displayC').innerText = dbs.C.current.base.toUpperCase();
        document.getElementById('ansC').value = ""; document.getElementById('fbC').innerText = "";
        document.getElementById('infoC').innerText = `RESTANTI: ${dbs.C.deck.length + 1}`;
    }

    function checkVerb() {
        const btn = document.getElementById('checkC'), ans = document.getElementById('ansC').value.trim().toLowerCase(), fb = document.getElementById('fbC');
        if(btn.innerText === "AVANTI") { nextVerb(); btn.innerText = "CONTROLLA"; return; }
        const okFull = dbs.C.current.full.toLowerCase().split(',').map(x=>x.trim()).includes(ans);
        const okIt = dbs.C.current.it.toLowerCase().split(',').map(x=>x.trim()).includes(ans);
        if(okFull || okIt) {
            fb.innerText = "CORRETTO! 🎉"; fb.style.color = "var(--green)"; btn.innerText = "AVANTI";
        } else {
            fb.innerHTML = `SBAGLIATO! ❌\nParadigma: ${dbs.C.current.full.toUpperCase()}\nTrad: ${dbs.C.current.it.toUpperCase()}`; fb.style.color = "var(--red)";
        }
    }

    function exportData() {
        const all = { A: dbs.A.data, D: dbs.D.data, B: dbs.B.data, C: dbs.C.data };
        const blob = new Blob([JSON.stringify(all)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `backup_flashcards_${APP_ID}.json`;
        a.click();
    }

    function importData(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                const data = JSON.parse(ev.target.result);
                if(data.A) { dbs.A.data = data.A; save('A'); }
                if(data.D) { dbs.D.data = data.D; save('D'); }
                if(data.B) { dbs.B.data = data.B; save('B'); }
                if(data.C) { dbs.C.data = data.C; save('C'); }
                location.reload();
            } catch(err) { alert("Errore nel file"); }
        };
        reader.readAsText(file);
    }

    window.onload = init;
</script>
</body>
</html>
