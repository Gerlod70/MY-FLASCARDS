<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcards Pro - V51.9.5</title>
    <style>
        :root { --blue: #007bff; --purple: #6f42c1; --dark-blue: #2c3e50; --bg: #f4f7f9; --text-dark: #2d3436; --deep-blue: #0984e3; --light-gray: #f1f2f6; --red: #e74c3c; --green: #27ae60; --orange: #f39c12; --teal: #00cec9; --grey: #636e72; --pink: #e84393; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 80px; color: var(--text-dark); overflow-x: hidden; width: 100vw; }
        button, .nav-btn, .list-btn { transition: transform 0.1s ease, opacity 0.1s ease; outline: none; cursor: pointer; border: none; }
        button:active, .nav-btn:active, .list-btn:active { transform: scale(0.92); opacity: 0.7; }
        .main-nav { background: #2c3e50; width: 100%; display: flex; justify-content: center; padding: 12px 0; gap: 15px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); flex-wrap: wrap; }
        .nav-btn { padding: 10px 20px; border-radius: 6px; font-weight: bold; color: white; background: #455a64; font-size: 14px; }
        .nav-btn.active-a { background: var(--blue); }
        .nav-btn.active-b { background: var(--purple); }
        .nav-btn.active-d { background: var(--pink); }
        .nav-btn.active-c { background: var(--dark-blue); border: 1px solid white; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 10px; }
        .card-mode-selector { padding: 5px 10px; border-radius: 8px; border: 1px solid #ddd; background: #f8f9fa; font-size: 13px; font-weight: bold; color: var(--text-dark); outline: none; }
        .card { background: white; width: 100%; max-width: 1000px; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin-bottom: 25px; border-top: 8px solid #ddd; box-sizing: border-box; }
        #sectionA .card { border-color: var(--blue); }
        #sectionB .card { border-color: var(--purple); }
        #sectionD .card { border-color: var(--pink); }
        #sectionC .card { border-color: var(--dark-blue); }
        .word-display { font-size: 34px; font-weight: 800; margin: 25px auto; display: flex; align-items: center; justify-content: flex-start; gap: 15px; min-height: 60px; color: #1a1a1a; word-break: break-word; width: 85%; max-width: 850px; text-align: left; }
        .input-group { display: flex; width: 85%; max-width: 850px; margin: 0 auto 10px auto; gap: 10px; }
        .game-input { flex: 1; padding: 18px; border: 2px solid #b2bec3; border-radius: 10px; font-size: 22px; text-align: center; outline: none; box-sizing: border-box; }
        .btn-check { width: 180px; padding: 0 15px; border-radius: 10px; font-weight: bold; color: white; background: #2d3436; font-size: 16px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .feedback-area { margin: 0 auto 20px auto; width: 85%; max-width: 850px; font-weight: 900; font-size: 26px; min-height: 45px; color: var(--deep-blue); line-height: 1.4; white-space: pre-line; text-align: left; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-content h3 { margin-top: 0; color: var(--dark-blue); }
        .modal-field { margin-bottom: 15px; }
        .modal-field label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .modal-field textarea { width: 100%; padding: 12px; border: 2px solid #dfe6e9; border-radius: 8px; font-size: 18px; font-family: inherit; resize: vertical; min-height: 80px; box-sizing: border-box; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
        .btn-modal { padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--green); color: white; }
        .btn-cancel { background: var(--grey); color: white; }
        .btn-restart { background: #27ae60; color: white; padding: 15px 30px; border-radius: 10px; font-size: 20px; font-weight: bold; margin-top: 20px; display: none; }
        .game-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 85%; max-width: 850px; margin: 0 auto; }
        .btn-act { padding: 14px; border-radius: 8px; color: white; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .btn-edit { background: #636e72; }
        .btn-postpone { background: var(--orange); }
        .btn-delete { background: var(--red); }
        .db-section { display: none; width: 100%; flex-direction: column; align-items: center; padding: 20px 0; }
        .db-section.active { display: flex; }
        .add-container { width: 100%; max-width: 1200px; background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; box-sizing: border-box;}
        .add-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .btn-add { background: var(--green); color: white; padding: 10px 20px; border-radius: 6px; font-weight: bold; font-size: 14px; }
        .search-container { width: 100%; max-width: 1200px; margin-bottom: 15px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; box-sizing: border-box; padding: 0 5px; }
        .search-input { width: 250px; flex-grow: 1; padding: 12px 15px; border-radius: 10px; border: 1px solid #dfe6e9; font-size: 16px; outline: none; box-sizing: border-box; }
        .btn-tool { padding: 10px 15px; border-radius: 8px; color: white; font-weight: bold; font-size: 12px; text-transform: uppercase; }
        .admin-panel { background: white; width: 100%; max-width: 1200px; border-radius: 15px; border: 1px solid #dfe6e9; margin-bottom: 30px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        .list-header { padding: 18px 25px; background: #f8f9fa; border-bottom: 2px solid #eee; font-weight: bold; }
        .scroll-area { max-height: 1000px; overflow-y: auto; overflow-x: auto; position: relative; -webkit-overflow-scrolling: touch; }
        table { width: 100%; min-width: 1000px; border-collapse: collapse; table-layout: fixed; }
        th { background: #2d3436; padding: 15px 5px; font-size: 11px; color: white; text-transform: uppercase; text-align: center; position: sticky; top: 0; z-index: 10; }
        td { padding: 12px 4px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; vertical-align: middle; }
        .col-idx { width: 40px; }
        .col-main { width: 230px; text-align: left !important; padding-left: 20px !important; font-weight: 700; word-break: break-word; }
        .col-trans { width: 400px; text-align: left !important; }
        .list-active-highlight { background-color: #e3f2fd; padding: 4px 8px; border-radius: 6px; display: inline-block; }
        .list-btn { padding: 8px 12px; border-radius: 6px; font-weight: bold; color: white; min-width: 40px; }
        .btn-edit-list { background: var(--grey); }
        .btn-postpone-list { background: var(--orange); }
        .btn-reactivate-list { background: var(--green); }
        .btn-trash-list { background: var(--red); box-shadow: 0 2px 4px rgba(231, 76, 60, 0.3); }
        .hidden-text { background: var(--light-gray); color: var(--deep-blue); padding: 8px 12px; border-radius: 6px; cursor: pointer; display: block; width: 95%; border: 1px solid #dcdde1; box-sizing: border-box; filter: blur(4px); white-space: pre-wrap; word-break: break-word; transition: filter 0.2s; }
        #tableC .hidden-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        tr:hover .hidden-text { filter: blur(0); background: var(--deep-blue); color: white !important; font-weight: bold; }
        .backup-footer { width: 100%; max-width: 1200px; display: flex; justify-content: center; gap: 20px; margin-top: 20px; padding: 20px; border-top: 2px dashed #ccc; box-sizing: border-box; }
        .btn-backup { padding: 15px 25px; border-radius: 10px; color: white; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-export { background: #2d3436; }
        .btn-import { background: #636e72; }
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 2000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold; pointer-events: none; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        select { padding: 6px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; }
        @keyframes fadein { from {bottom: 0; opacity:0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
        @media (max-width: 768px) { .word-display { justify-content: center; text-align: center; } .input-group { width: 100%; flex-direction: column; } .btn-check { width: 100%; padding: 15px; } .card { padding: 15px; } .add-container { flex-direction: column; } .btn-tool { flex: 1; text-align: center; } .backup-footer { flex-direction: column; align-items: stretch; } .btn-backup { width: 100%; } }
    </style>
</head>
<body>

    <div id="toast">Operazione completata!</div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modalTitle">Modifica Elemento</h3>
            <div id="fieldsA" style="display:none">
                <div class="modal-field"><label>Inglese:</label><textarea id="editEn"></textarea></div>
                <div class="modal-field"><label>Italiano:</label><textarea id="editIt"></textarea></div>
            </div>
            <div id="fieldsC" style="display:none">
                <div class="modal-field"><label>Base:</label><textarea id="editBaseC"></textarea></div>
                <div class="modal-field"><label>Paradigma:</label><textarea id="editFullC"></textarea></div>
                <div class="modal-field"><label>Traduzione:</label><textarea id="editItC"></textarea></div>
            </div>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="closeModal()">Annulla</button>
                <button class="btn-modal btn-save" onclick="saveModal()">Salva</button>
            </div>
        </div>
    </div>

    <nav class="main-nav">
        <button id="navA" class="nav-btn active-a" onclick="switchTab('A')">Database 1</button>
        <button id="navD" class="nav-btn" onclick="switchTab('D')">Database 2</button>
        <button id="navB" class="nav-btn" onclick="switchTab('B')">Lesson and Grammar</button>
        <button id="navC" class="nav-btn" onclick="switchTab('C')">Verbi Irregolari</button>
    </nav>

    <template id="db-template">
        <section class="db-section">
            <div class="card">
                <div class="card-header">
                    <div class="info-div" style="font-size:14px; font-weight:bold;"></div>
                    <select class="card-mode-selector">
                        <option value="en">Solo Eng</option>
                        <option value="it">Solo Ita</option>
                        <option value="alt">Modalità Alt</option>
                    </select>
                </div>
                <div class="word-display"><span class="display-span">...</span><button class="speak-btn" style="background:none; font-size:30px;">🔊</button></div>
                <div class="game-div">
                    <div class="input-group">
                        <input type="text" class="game-input" placeholder="Traduci..." autocomplete="off">
                        <button class="btn-check">CONTROLLA</button>
                    </div>
                    <div class="feedback-area"></div>
                    <div class="game-controls">
                        <button class="btn-act btn-edit">Modifica</button>
                        <button class="btn-act btn-postpone">Posticipa</button>
                        <button class="btn-act btn-delete">Elimina</button>
                    </div>
                </div>
                <button class="btn-restart">RICOMINCIA SESSIONE 🔄</button>
            </div>
            <div class="add-container">
                <input type="text" class="add-input add-en" placeholder="Testo Inglese">
                <input type="text" class="add-input add-it" placeholder="Traduzione Italiana">
                <button class="btn-add">AGGIUNGI +</button>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Cerca...">
                <button class="btn-tool btn-refresh" style="background:var(--grey)">🔄 AGGIORNA</button>
                <button class="btn-tool btn-postpone-all" style="background:var(--orange)">⏳ POSTICIPA TUTTO</button>
                <button class="btn-tool btn-reactivate-all" style="background:var(--teal)">⚡ RIATTIVA TUTTO</button>
                <button class="btn-tool btn-rotate-alt" style="background:var(--blue)">RUOTA ALT 🔄</button>
            </div>
            <div class="admin-panel"><div class="list-header">Lista</div><div class="scroll-area"><table class="db-table"></table></div></div>
        </section>
    </template>

    <div id="sections-container"></div>

    <section id="sectionC" class="db-section">
        <div class="card">
            <div class="card-header">
                <div id="infoC" style="font-weight: bold; color: #7f8c8d;"></div>
                <select id="gameModeC" class="card-mode-selector" onchange="syncFromGame('C')">
                    <option value="en">Eng -> Ita</option>
                    <option value="it">Ita -> Eng</option>
                    <option value="alt">Modalità Alt</option>
                </select>
            </div>
            <div class="word-display"><span id="displayC">...</span><button id="speakBtnC" onclick="speakItem(dbs.C.current.full)" style="background:none; font-size:30px;">🔊</button></div>
            <div id="gameC">
                <div class="input-group">
                    <input type="text" id="ansC" class="game-input" placeholder="Paradigma o Traduzione..." autocomplete="off">
                    <button id="checkC" class="btn-check" onclick="checkVerb()" style="background:var(--dark-blue)">CONTROLLA</button>
                </div>
                <div id="fbC" class="feedback-area"></div>
                <div class="game-controls">
                    <button class="btn-act btn-edit" onclick="manualEdit('C')">Modifica</button>
                    <button class="btn-act btn-postpone" onclick="togglePause('C')">Posticipa</button>
                    <button class="btn-act btn-delete" onclick="manualDelete('C')">Elimina</button>
                </div>
            </div>
            <button id="restartC" class="btn-restart" onclick="restartSession('C')">RICOMINCIA SESSIONE 🔄</button>
        </div>
        <div class="add-container"><input type="text" id="newBaseC" class="add-input" placeholder="Base" onkeydown="if(event.key==='Enter') addNewItem('C')"><input type="text" id="newFullC" class="add-input" placeholder="Paradigma" onkeydown="if(event.key==='Enter') addNewItem('C')"><input type="text" id="newItC" class="add-input" placeholder="Traduzione" onkeydown="if(event.key==='Enter') addNewItem('C')"><button class="btn-add" style="background:var(--dark-blue)" onclick="addNewItem('C')">AGGIUNGI +</button></div>
        <div class="search-container">
            <input type="text" id="searchC" class="search-input" placeholder="Cerca..." oninput="renderTable('C')">
            <button class="btn-tool" style="background:var(--grey)" onclick="refreshList('C')">🔄 AGGIORNA</button>
            <button class="btn-tool" style="background:var(--orange)" onclick="postponeAll('C')">⏳ POSTICIPA TUTTO</button>
            <button class="btn-tool" style="background:var(--teal)" onclick="reactivateAll('C')">⚡ RIATTIVA TUTTO</button>
            <button class="btn-tool" style="background:var(--dark-blue)" onclick="forceAltRotation('C')">RUOTA ALT 🔄</button>
        </div>
        <div class="admin-panel"><div class="list-header">Lista Verbi</div><div class="scroll-area"><table id="tableC"></table></div></div>
    </section>

    <div class="backup-footer">
        <button class="btn-backup btn-export" onclick="exportData()">💾 ESPORTA TUTTI I DATI (BACKUP)</button>
        <button class="btn-backup btn-import" onclick="document.getElementById('importFile').click()">📂 IMPORTA DATI DA FILE</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

<script>
    const isIPhone = /iPhone|iPod|iPad/i.test(navigator.userAgent);
    let dbs = {
        A: { key: 'flash_v_pc_pro_DATABASE_A', data: [], deck: [], current: null, color: 'var(--blue)', label: 'Database 1' },
        D: { key: 'flash_v_pc_pro_DATABASE_D', data: [], deck: [], current: null, color: 'var(--pink)', label: 'Database 2' },
        B: { key: 'flash_v_pc_pro_DATABASE_B', data: [], deck: [], current: null, color: 'var(--purple)', label: 'Lesson and Grammar' },
        C: { key: 'VERBI_PRO_STABLE_V15', data: [], deck: [], current: null, color: 'var(--dark-blue)', label: 'Verbi Irregolari' }
    };
    let currentEditState = { t: null, i: null };

    // Inizializzazione dinamica sezioni A, B, D
    ['A', 'D', 'B'].forEach(t => {
        const temp = document.getElementById('db-template').content.cloneNode(true);
        const sec = temp.querySelector('section');
        sec.id = 'section' + t;
        sec.querySelector('.info-div').id = 'info' + t;
        sec.querySelector('.info-div').style.color = dbs[t].color;
        
        const sel = sec.querySelector('.card-mode-selector');
        sel.id = 'gameMode' + t;
        sel.onchange = () => syncFromGame(t);
        
        sec.querySelector('.display-span').id = 'display' + t;
        sec.querySelector('.speak-btn').onclick = () => speakItem(dbs[t].current.en);
        sec.querySelector('.game-div').id = 'game' + t;
        
        const ans = sec.querySelector('.game-input');
        ans.id = 'ans' + t;
        const chk = sec.querySelector('.btn-check');
        chk.id = 'check' + t;
        chk.onclick = () => checkGeneric(t);
        if(t==='B') chk.style.background = 'var(--purple)';
        if(t==='D') chk.style.background = 'var(--pink)';
        
        sec.querySelector('.feedback-area').id = 'fb' + t;
        sec.querySelector('.btn-edit').onclick = () => manualEdit(t);
        sec.querySelector('.btn-postpone').onclick = () => togglePause(t);
        sec.querySelector('.btn-delete').onclick = () => manualDelete(t);
        
        const rest = sec.querySelector('.btn-restart');
        rest.id = 'restart' + t;
        rest.onclick = () => restartSession(t);
        
        const inEn = sec.querySelector('.add-en');
        inEn.id = 'newEn' + t;
        inEn.oninput = () => handleIPhoneBtn(t);
        inEn.onkeydown = (e) => handlePcTranslate(e, t, 'en');
        
        const inIt = sec.querySelector('.add-it');
        inIt.id = 'newIt' + t;
        inIt.oninput = () => handleIPhoneBtn(t);
        inIt.onkeydown = (e) => handlePcTranslate(e, t, 'it');
        
        const bAdd = sec.querySelector('.btn-add');
        bAdd.id = 'btnAdd' + t;
        bAdd.onclick = () => smartAdd(t);
        if(t==='B') bAdd.style.background = 'var(--purple)';
        if(t==='D') bAdd.style.background = 'var(--pink)';
        
        sec.querySelector('.search-input').id = 'search' + t;
        sec.querySelector('.search-input').oninput = () => renderTable(t);
        sec.querySelector('.btn-refresh').onclick = () => refreshList(t);
        sec.querySelector('.btn-postpone-all').onclick = () => postponeAll(t);
        sec.querySelector('.btn-reactivate-all').onclick = () => reactivateAll(t);
        
        const bRot = sec.querySelector('.btn-rotate-alt');
        bRot.onclick = () => forceAltRotation(t);
        bRot.style.background = dbs[t].color;
        
        sec.querySelector('.list-header').innerText = 'Lista ' + dbs[t].label;
        sec.querySelector('.db-table').id = 'table' + t;
        
        document.getElementById('sections-container').appendChild(sec);
    });

    // --- LOGICA CORE ---

    function load(t) {
        const stored = localStorage.getItem(dbs[t].key);
        if (stored) dbs[t].data = JSON.parse(stored);
        
        // Carica la selezione del linguaggio salvata
        const savedMode = localStorage.getItem('mode_' + dbs[t].key);
        if(savedMode) document.getElementById('gameMode' + t).value = savedMode;
        
        buildDeck(t);
        renderTable(t);
    }

    function save(t) {
        localStorage.setItem(dbs[t].key, JSON.stringify(dbs[t].data));
        // Salva la selezione del linguaggio corrente
        const currentMode = document.getElementById('gameMode' + t).value;
        localStorage.setItem('mode_' + dbs[t].key, currentMode);
    }

    function buildDeck(t) {
        dbs[t].deck = dbs[t].data.filter(x => (x.nextReview || 0) <= Date.now());
        dbs[t].deck.sort(() => Math.random() - 0.5);
        if (t === 'C') nextVerb(); else nextCard(t);
    }

    // Modifica: Aggiunta parola senza resettare il gioco
    function addNewItem(t) {
        if (t === 'C') {
            const base = document.getElementById('newBaseC').value.trim(), full = document.getElementById('newFullC').value.trim(), it = document.getElementById('newItC').value.trim();
            if(!base || !full || !it) return;
            dbs[t].data.push({ base, full, it, nextReview: 0, mode: 'alt', lastAltState: 'en' });
            document.getElementById('newBaseC').value = ""; document.getElementById('newFullC').value = ""; document.getElementById('newItC').value = "";
        } else {
            const en = document.getElementById('newEn' + t).value.trim(), it = document.getElementById('newIt' + t).value.trim();
            if(!en || !it) return;
            const newItem = { en, it, nextReview: 0, mode: 'alt', lastAltState: 'en' };
            dbs[t].data.push(newItem);
            // Se non c'è una parola attiva, la mostriamo
            if(!dbs[t].current) {
                dbs[t].deck.push(newItem);
                nextCard(t);
            }
            document.getElementById('newEn' + t).value = ""; document.getElementById('newIt' + t).value = "";
            if (isIPhone) handleIPhoneBtn(t);
        }
        save(t); renderTable(t); showToast("Aggiunto!");
    }

    function nextCard(t, forceNext = false) {
        const display = document.getElementById('display' + t), info = document.getElementById('info' + t), game = document.getElementById('game' + t), restart = document.getElementById('restart' + t);
        if (!forceNext && dbs[t].current && dbs[t].deck.length > 0) return; 
        if (dbs[t].deck.length === 0) {
            display.innerText = "Sessione Finita!"; info.innerText = ""; game.style.display = 'none'; restart.style.display = 'block'; dbs[t].current = null; return;
        }
        restart.style.display = 'none'; game.style.display = 'block';
        dbs[t].current = dbs[t].deck.shift();
        updateDisplay(t);
    }

    function updateDisplay(t) {
        const item = dbs[t].current, mode = document.getElementById('gameMode' + t).value;
        let actualMode = mode;
        if (mode === 'alt') {
            actualMode = (item.lastAltState === 'en') ? 'it' : 'en';
            item.lastAltState = actualMode;
        }
        item.currentMode = actualMode;
        document.getElementById('display' + t).innerText = (actualMode === 'en') ? item.en : item.it;
        document.getElementById('ans' + t).value = ""; document.getElementById('fb' + t).innerText = "";
        document.getElementById('info' + t).innerText = `${dbs[t].label} - Mancanti: ${dbs[t].deck.length + 1}`;
    }

    function checkGeneric(t) {
        const item = dbs[t].current, ans = document.getElementById('ans' + t).value.trim().toLowerCase(), fb = document.getElementById('fb' + t);
        if (!item) return;
        const correct = (item.currentMode === 'en') ? item.it.toLowerCase() : item.en.toLowerCase();
        const choices = correct.split(',').map(x => x.trim());
        if (choices.includes(ans)) {
            fb.innerText = "CORRETTO! 🎉"; fb.style.color = "var(--green)";
            setTimeout(() => nextCard(t, true), 600);
        } else {
            fb.innerText = `SBAGLIATO.\nRisposta: ${correct.toUpperCase()}`; fb.style.color = "var(--red)";
        }
    }

    // --- GESTIONE VERBI (C) ---
    function nextVerb(force = false) {
        const res = document.getElementById('restartC'), gm = document.getElementById('gameC'), disp = document.getElementById('displayC'), inf = document.getElementById('infoC');
        if (!force && dbs.C.current && dbs.C.deck.length > 0) return;
        if (dbs.C.deck.length === 0) {
            disp.innerText = "Sessione Finita!"; inf.innerText = ""; gm.style.display = 'none'; res.style.display = 'block'; dbs.C.current = null; return;
        }
        res.style.display = 'none'; gm.style.display = 'block';
        dbs.C.current = dbs.C.deck.shift();
        const item = dbs.C.current, mode = document.getElementById('gameModeC').value;
        let act = mode;
        if(mode==='alt'){ act = (item.lastAltState === 'en') ? 'it' : 'en'; item.lastAltState = act; }
        item.currentMode = act;
        disp.innerText = (act === 'en') ? item.base : item.it;
        document.getElementById('ansC').value = ""; document.getElementById('fbC').innerText = "";
        inf.innerText = `Verbi - Mancanti: ${dbs.C.deck.length + 1}`;
    }

    function checkVerb() {
        const item = dbs.C.current, ans = document.getElementById('ansC').value.trim().toLowerCase(), fb = document.getElementById('fbC');
        const correct = (item.currentMode === 'en') ? item.full.toLowerCase() : item.base.toLowerCase();
        if (ans === correct || item.full.toLowerCase().split('/').includes(ans)) {
            fb.innerText = "CORRETTO!"; fb.style.color = "var(--green)";
            setTimeout(() => nextVerb(true), 600);
        } else {
            fb.innerText = `ERRORE.\nCorretto: ${correct.toUpperCase()}`; fb.style.color = "var(--red)";
        }
    }

    // --- FUNZIONI COMUNI & UI ---

    function switchTab(t) {
        document.querySelectorAll('.db-section').forEach(s => s.classList.remove('active'));
        document.getElementById('section' + t).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => {
            b.classList.remove('active-a','active-b','active-c','active-d');
        });
        document.getElementById('nav' + t).classList.add('active-' + t.toLowerCase());
    }

    function syncFromGame(t) { 
        save(t); // Salva la selezione
        if(dbs[t].current) updateDisplay(t); 
    }

    function renderTable(t) {
        const search = document.getElementById('search' + t).value.toLowerCase();
        const table = document.getElementById('table' + t);
        let html = `<tr><th class="col-idx">#</th><th class="col-main">${t==='C'?'Base':'Inglese'}</th><th class="col-trans">Traduzione</th><th>Azioni</th></tr>`;
        dbs[t].data.forEach((item, i) => {
            if (search && !((item.en || item.base).toLowerCase().includes(search) || item.it.toLowerCase().includes(search))) return;
            const isPaused = (item.nextReview || 0) > Date.now();
            html += `<tr style="${isPaused?'opacity:0.5':''}">
                <td>${i+1}</td>
                <td class="col-main">${(item.en || item.base).toUpperCase()}</td>
                <td class="col-trans"><div class="hidden-text">${(item.it || '').toUpperCase()}${t==='C'?' ['+item.full.toUpperCase()+']':''}</div></td>
                <td>
                    <button class="list-btn btn-edit-list" onclick="manualEdit('${t}', ${i})">✏️</button>
                    <button class="list-btn ${isPaused?'btn-reactivate-list':'btn-postpone-list'}" onclick="togglePause('${t}', ${i})">${isPaused?'⚡':'⏳'}</button>
                    <button class="list-btn btn-trash-list" onclick="manualDelete('${t}', ${i})">🗑️</button>
                </td>
            </tr>`;
        });
        table.innerHTML = html;
    }

    function manualEdit(t, i) {
        let item = (i === undefined) ? dbs[t].current : dbs[t].data[i];
        if (!item) return;
        currentEditState = { t, i };
        document.getElementById('editModal').style.display = 'flex';
        if (t === 'C') {
            document.getElementById('fieldsA').style.display = 'none'; document.getElementById('fieldsC').style.display = 'block';
            document.getElementById('editBaseC').value = item.base; document.getElementById('editFullC').value = item.full; document.getElementById('editItC').value = item.it;
        } else {
            document.getElementById('fieldsC').style.display = 'none'; document.getElementById('fieldsA').style.display = 'block';
            document.getElementById('editEn').value = item.en; document.getElementById('editIt').value = item.it;
        }
    }

    function saveModal() {
        const { t, i } = currentEditState;
        let item = (i === undefined) ? dbs[t].current : dbs[t].data[i];
        if (t === 'C') {
            item.base = document.getElementById('editBaseC').value.trim(); item.full = document.getElementById('editFullC').value.trim(); item.it = document.getElementById('editItC').value.trim();
            if (i === undefined) nextVerb(true);
        } else {
            item.en = document.getElementById('editEn').value.trim(); item.it = document.getElementById('editIt').value.trim();
            if (i === undefined) nextCard(t, true);
        }
        save(t); renderTable(t); closeModal(); showToast("Salvato!");
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    function togglePause(t, i) {
        let item = (i === undefined) ? dbs[t].current : dbs[t].data[i];
        if (!item) return;
        const isPaused = (item.nextReview || 0) > Date.now();
        item.nextReview = isPaused ? 0 : Date.now() + (365 * 86400000);
        save(t); renderTable(t);
        if (i === undefined) (t === 'C') ? nextVerb(true) : nextCard(t, true);
        showToast(isPaused ? "Riattivato" : "Posticipato");
    }

    function manualDelete(t, i) {
        if (!confirm("Eliminare definitivamente?")) return;
        if (i === undefined) {
            const idx = dbs[t].data.indexOf(dbs[t].current);
            if (idx > -1) dbs[t].data.splice(idx, 1);
            (t === 'C') ? nextVerb(true) : nextCard(t, true);
        } else {
            dbs[t].data.splice(i, 1);
        }
        save(t); renderTable(t); showToast("Eliminato");
    }

    function restartSession(t) { buildDeck(t); }

    function postponeAll(t) { dbs[t].data.forEach(x => x.nextReview = Date.now() + 365*86400000); save(t); buildDeck(t); renderTable(t); }
    function reactivateAll(t) { dbs[t].data.forEach(x => x.nextReview = 0); save(t); buildDeck(t); renderTable(t); }
    function forceAltRotation(t) { dbs[t].data.forEach(x => x.lastAltState = (x.lastAltState === 'en' ? 'it' : 'en')); save(t); buildDeck(t); showToast("Rotazione Alt completata"); }
    function refreshList(t) { renderTable(t); showToast("Lista aggiornata"); }

    async function translateText(text, from, to) {
        if(!text) return "";
        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`);
            const json = await res.json(); return json[0][0][0];
        } catch (e) { return ""; }
    }

    async function handlePcTranslate(e, t, lang) {
        if (isIPhone || e.key !== 'Enter') return;
        const enIn = document.getElementById('newEn' + t), itIn = document.getElementById('newIt' + t);
        if(enIn.value && itIn.value) { addNewItem(t); return; }
        if (lang === 'en' && enIn.value) { itIn.placeholder = "Traduco..."; itIn.value = await translateText(enIn.value, 'en', 'it'); itIn.placeholder = "Traduzione Italiana"; }
        else if (lang === 'it' && itIn.value) { enIn.placeholder = "Traduco..."; enIn.value = await translateText(itIn.value, 'it', 'en'); enIn.placeholder = "Testo Inglese"; }
    }

    function handleIPhoneBtn(t) {
        if (!isIPhone) return;
        const btn = document.getElementById('btnAdd' + t), enVal = document.getElementById('newEn' + t).value, itVal = document.getElementById('newIt' + t).value;
        if ((enVal && !itVal) || (itVal && !enVal)) { btn.innerText = "TRADUCI"; btn.style.background = "#3498db"; }
        else { btn.innerText = "AGGIUNGI +"; btn.style.background = dbs[t].color; }
    }

    async function smartAdd(t) {
        const btn = document.getElementById('btnAdd' + t), enIn = document.getElementById('newEn' + t), itIn = document.getElementById('newIt' + t);
        if (isIPhone && btn.innerText === "TRADUCI") {
            if (enIn.value && !itIn.value) itIn.value = await translateText(enIn.value, 'en', 'it');
            else if (itIn.value && !enIn.value) enIn.value = await translateText(itIn.value, 'it', 'en');
            handleIPhoneBtn(t);
        } else { addNewItem(t); }
    }

    function speakItem(text) {
        if (!text) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text.replace(/[/\\|()]/g, ' '));
        msg.lang = 'en-US'; window.speechSynthesis.speak(msg);
    }

    function showToast(msg) {
        const t = document.getElementById("toast"); t.innerText = msg; t.className = "show";
        setTimeout(() => t.className = t.className.replace("show", ""), 3000);
    }

    function exportData() {
        const allData = { A: dbs.A.data, B: dbs.B.data, C: dbs.C.data, D: dbs.D.data };
        const blob = new Blob([JSON.stringify(allData)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `backup_flashcards_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    function importData(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                Object.keys(dbs).forEach(k => { if(imported[k]) { dbs[k].data = imported[k]; save(k); buildDeck(k); renderTable(k); } });
                showToast("Dati importati con successo!");
            } catch (err) { alert("Errore nel formato del file!"); }
        };
        reader.readAsText(file);
    }

    // Avvio
    Object.keys(dbs).forEach(t => load(t));
</script>
</body>
</html>
